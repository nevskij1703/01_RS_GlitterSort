<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1238">
<title>GlitterSort — Колбочки</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='22' y='8' width='20' height='48' rx='10' fill='%23ec4899' stroke='%23fff' stroke-width='3'/></svg>">
<style>
/* ============================================================
   GlitterSort — single-file HTML game
   See docs/ARCHITECTURE.md for module map.
   ============================================================ */

:root{
  /* Dark navy palette по референсу Get Color (Бутылочки и Пробирки). */
  --bg-1:#0d1937;
  --bg-2:#15225a;
  --bg-3:#1d2f7a;
  --panel:rgba(255,255,255,.07);
  --panel-border:rgba(255,255,255,.14);
  --text:#f1eaff;
  --text-dim:#9eb4dc;
  --accent:#ffd86b;
  --accent-2:#ff7ac6;
  --danger:#ff5b73;
  --ok:#7be37b;

  /* Колбочки — палитра из 11 цветов. Поддерживает уровни с
     filled до 11 колб (макс. конфиг: 12 колб, 1 пустая). */
  --c-pink:#ff5fa2;
  --c-orange:#ff8a2b;
  --c-yellow:#ffd23f;
  --c-lime:#9bdc2f;
  --c-teal:#22d3c8;
  --c-blue:#3a8bff;
  --c-purple:#b65bff;
  --c-crimson:#ef3a5d;
  --c-cyan:#22ddff;
  --c-mint:#5be3a0;
  --c-coral:#ff7b6b;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg-1);font-family:'Russo One','Segoe UI',system-ui,sans-serif;color:var(--text);user-select:none;-webkit-user-select:none;touch-action:manipulation}
body{
  background:
    /* Полупрозрачный паттерн «капли/пузырьки» — еле заметные кружки */
    radial-gradient(circle at 14% 18%, rgba(255,255,255,.045) 1.6px, transparent 2.2px),
    radial-gradient(circle at 78% 32%, rgba(255,255,255,.04) 1.2px, transparent 2px),
    radial-gradient(circle at 42% 64%, rgba(255,255,255,.05) 2px, transparent 2.8px),
    radial-gradient(circle at 88% 86%, rgba(255,255,255,.04) 1.4px, transparent 2.4px),
    /* Тонкая косая сетка-«линии стекла» */
    repeating-linear-gradient(115deg, rgba(255,255,255,.018) 0 1px, transparent 1px 32px),
    repeating-linear-gradient(65deg, rgba(255,255,255,.018) 0 1px, transparent 1px 28px),
    /* Базовый фиолетовый градиент */
    radial-gradient(ellipse at top, var(--bg-3) 0%, var(--bg-2) 35%, var(--bg-1) 75%),
    var(--bg-1);
  background-size: 240px 240px, 320px 320px, 380px 380px, 280px 280px, auto, auto, auto, auto;
  background-attachment:fixed;
}

#app{position:fixed;inset:0;display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* (header убран — счётчик ходов скрыт) */

/* ===== LEVEL TITLE — компактный блок над полем (колбы остаются по центру field). */
.level-title{
  flex:0 0 auto;
  display:flex;flex-direction:column;align-items:center;
  /* Заголовок опущен ниже от верха экрана — раньше было clamp(12,3vh,28).
     Теперь больше воздуха сверху + отступ снизу до поля. */
  padding:clamp(32px, 7vh, 64px) 16px 14px;
  text-align:center;
  gap:10px;
}
.level-title .lt-name{
  font-size:clamp(40px, 10vw, 64px);
  font-weight:700;
  letter-spacing:1.5px;
  color:var(--text);
  text-transform:uppercase;
  line-height:1;
  cursor:default;
  user-select:none;
  -webkit-user-select:none;
  text-shadow:0 4px 18px rgba(0,0,0,.55), 0 0 28px rgba(255,216,107,.2);
}
.level-title .lt-name b{
  color:var(--accent);
  font-weight:700;
}
.level-title .lt-diff{
  font-size:26px;
  font-weight:600;
  color:var(--diff-color, var(--text-dim));
  letter-spacing:.8px;
  text-shadow:0 2px 10px rgba(0,0,0,.45);
  transition:color .2s ease;
}

/* ===== PLAYFIELD ===== */
.field{
  flex:1 1 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
  position:relative;
  overflow:hidden;
}
.sticks{
  display:grid;
  /* По колонкам — базовый шаг. По рядам — то же значение, но для 2-рядных
     раскладок (6-10 колб) дополнительно расширяется ниже. */
  column-gap:clamp(16px,4.5vw,30px);
  row-gap:clamp(16px,4.5vw,30px);
  width:100%;
  max-width:560px;
  align-items:end;
  justify-items:center;
  padding:8px;
}
/* 2-рядные раскладки (6-10 колб) — даём больше воздуха по вертикали между
   рядами. На 3-рядных (11-13) оставляем базовый row-gap, иначе колбы
   ужмутся слишком сильно. */
.sticks[data-count="6"],
.sticks[data-count="7"],
.sticks[data-count="8"],
.sticks[data-count="9"],
.sticks[data-count="10"]{
  row-gap:clamp(28px,7vw,52px);
}

/* layout by stick count — set via [data-count] on .sticks */
.sticks[data-count="3"]{grid-template-columns:repeat(3,1fr)}
.sticks[data-count="4"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="5"]{grid-template-columns:repeat(5,1fr)}
.sticks[data-count="6"]{grid-template-columns:repeat(3,1fr)}
.sticks[data-count="7"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="8"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="9"]{grid-template-columns:repeat(5,1fr)}
.sticks[data-count="10"]{grid-template-columns:repeat(5,1fr)}
.sticks[data-count="11"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="12"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="13"]{grid-template-columns:repeat(5,1fr)}

/* ===== BOTTLE =====
   Силуэт лабораторной колбы — ЕДИНАЯ форма (горлышко + плечики + корпус +
   округлое дно), задаётся SVG-маской на .bottle. Никаких «накладок» сверху.
   Жидкость, блик и пробка — children внутри маскированного контейнера.
   Контур имитируется через несколько drop-shadow'ов (mask нельзя сочетать
   с обычным border).
*/
.bottle{
  /* Колба рисуется как inline-SVG внутри .bottle (см. Render.buildBottle).
     Контур (outline path) использует currentColor — меняем цвет состояния
     через CSS color: вместо filter-обводки.
     --bottle-max — пиксельный лимит ширины, считается JS-ом в Render.fitBottles()
     с учётом числа колб (для 12 шт. колбы ужимаются, чтобы 3 ряда влезли).
     Базовый максимум 52px (1.5× меньше прежних 78px) — после правки
     пользователя «уменьш на всех экранах размер колбочек в 1,5 раза». */
  position:relative;
  width:100%;
  max-width:var(--bottle-max, 52px);
  aspect-ratio:1051 / 3484.75;
  cursor:pointer;
  color:#ffffff;
  transition:transform .25s cubic-bezier(.3,0,.3,1), color .15s, filter .15s;
  filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));
}
/* SVG и его дети — не ловят клики; клик идёт на .bottle div, чтобы зона
   тапа точно совпадала с прямоугольником колбы и hit-area не зависела
   от прозрачных областей SVG (горлышко, плечики). */
.bottle svg{width:100%;height:100%;display:block;overflow:visible;pointer-events:none}
.bottle.selected{
  transform:translateY(-16px);
  color:var(--accent);
  filter:drop-shadow(0 10px 16px rgba(255,216,107,.35));
}
/* .completed не перекрашивает обводку — вместо подсветки в правом нижнем
   углу появляется бейдж с галочкой (см. .check-badge ниже). Бутылка остаётся
   в нейтральном белом контуре, индикатор «собрана» — отдельный элемент. */

/* Бейдж «галочка» в правом-нижнем углу собранной колбы.
   Размер чуть меньше «+» на бонусной колбе (тот ~26px idle / ~30px peak),
   целимся в ~24px, масштабируем для мелких экранов.
   Цвет — приглушённый зелёный (не такой яркий как --ok=#7be37b).
   Без обводки; сидит чуть правее (right:-6) и чуть выше (translateY 20%
   вместо 50%) — теперь висит, лишь слегка свешиваясь за кромку. */
.bottle .check-badge{
  position:absolute;
  right:-6px;
  bottom:0;
  width:clamp(16px, 46%, 24px);
  aspect-ratio:1;
  border-radius:50%;
  background:#43a047;
  display:flex;align-items:center;justify-content:center;
  z-index:4;
  box-shadow:0 3px 6px rgba(0,0,0,.45);
  pointer-events:none;
  animation:checkPop .35s cubic-bezier(.5,1.6,.5,1) both;
}
.bottle .check-badge svg{
  width:64%;height:64%;
  /* SVG-галочка нарисована inline в Render.buildBottle; обводка белая. */
}
/* translateY(20%) во всех кейфреймах — бейдж висит, опускаясь
   примерно на 1/5 своего диаметра ниже нижней кромки колбы. scale 0→1
   делает pop-эффект. */
@keyframes checkPop{
  0%{transform:translateY(20%) scale(0);opacity:0}
  100%{transform:translateY(20%) scale(1);opacity:1}
}

/* Анимация наполнения нового слоя — SVG rect растёт СНИЗУ ВВЕРХ через scaleY:
   жидкость оседает на дно/предыдущий слой и потом «наполняется» до своей
   высоты. transform-origin:50% 100% (нижняя кромка слоя).
   Для мульти-переливания каждый слой получает inline animation-delay,
   так что они заполняются ПОСЛЕДОВАТЕЛЬНО (без разрывов между слоями). */
.bottle svg rect.layer.is-new{
  transform-box:fill-box;
  transform-origin:50% 100%;
  animation:layerFill .32s cubic-bezier(.3,0,.3,1) both;
}
@keyframes layerFill{
  0%{transform:scaleY(0);opacity:.4}
  100%{transform:scaleY(1);opacity:1}
}

/* (Пробка убрана — на собранной колбе ничего не наносится сверху,
   только меняется цвет обводки через .bottle.completed.) */
/* (CSS-классы для цветов слоёв убраны — fill подставляется inline
   в SVG <rect> прямо в Render.buildBottle.) */

/* ===== «+» bottle — полупрозрачная колба для активации бонуса =====
   Сам силуэт колбы делаем заметно прозрачнее (контур — currentColor с
   низкой альфой), а круг «+» внутри SVG нарисован отдельной заливкой
   (url(#plusBg)) и остаётся полностью непрозрачным. */
.bottle.bottle-add{
  color:rgba(255,216,107,.28);
  filter:drop-shadow(0 3px 6px rgba(0,0,0,.3));
}
.bottle.bottle-add:hover{color:rgba(255,216,107,.55)}
.bottle.bottle-add .add-plus{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(180deg,#ffd23f,#ff8a2b);
  color:#3b1300;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;font-weight:700;line-height:1;
  box-shadow:0 6px 12px rgba(255,138,43,.45), inset 0 -3px 6px rgba(0,0,0,.18);
  z-index:5;
  animation:bonusPulse 1.6s ease-in-out infinite;
}
.bottle.bottle-add:hover{border-color:var(--accent);background:rgba(255,216,107,.08)}
@keyframes bonusPulse{
  0%,100%{transform:translate(-50%,-50%) scale(1)}
  50%{transform:translate(-50%,-50%) scale(1.12)}
}

/* ===== Анимация переливания — управляется JS (Render.animatePour) =====
   Колба-источник перелетает к приёмнику, наклоняется, появляется струйка,
   приёмник чуть подскакивает, источник возвращается. */
.bottle.pouring{
  z-index:6;
  transform-origin:50% 95%;
}
.bottle.receiving-bump{animation:receiveBump .25s ease}
@keyframes receiveBump{
  0%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
  100%{transform:translateY(0)}
}
/* Струйка жидкости при переливании (создаётся JS-ом). */
.pour-stream{
  position:fixed;
  width:7px;
  background:var(--stream-color, var(--accent));
  border-radius:4px;
  pointer-events:none;
  z-index:10;
  box-shadow:0 0 10px var(--stream-color, var(--accent));
  transform-origin:top center;
  animation:streamPulse .55s ease-out forwards;
}
@keyframes streamPulse{
  0%{transform:scaleY(0);opacity:0}
  20%{transform:scaleY(1);opacity:.95}
  85%{transform:scaleY(1);opacity:.95}
  100%{transform:scaleY(.5);opacity:0}
}

/* ===== ТУТОРИАЛЬНАЯ РУКА ===== */
.tutorial-hand{
  position:fixed;
  width:48px;height:48px;
  pointer-events:none;
  z-index:30;
  font-size:42px;
  filter:drop-shadow(0 4px 8px rgba(0,0,0,.5));
  transform-origin:30% 30%;
  transition:left .4s ease, top .4s ease, opacity .3s;
  opacity:0;
}
.tutorial-hand.show{opacity:1}
.tutorial-hand.tapping{animation:handTap 1.2s ease-in-out infinite}
@keyframes handTap{
  0%,100%{transform:scale(1) translateY(0)}
  35%{transform:scale(.78) translateY(6px)}
  60%{transform:scale(1.05) translateY(-2px)}
}
/* Tutorial highlight — мягкое жёлтое свечение вокруг колбы-цели, плюс
   одиночный hop (подпрыгивание) при появлении руки. */
.bottle.tutorial-target{
  filter:drop-shadow(0 0 14px rgba(255,216,107,.6)) drop-shadow(0 4px 10px rgba(0,0,0,.5));
}
.bottle.tutorial-pulse{
  animation:tutorialHop .55s cubic-bezier(.4,1.6,.5,1) 1;
}
@keyframes tutorialHop{
  0%   { transform: translateY(0); }
  40%  { transform: translateY(-12px); }
  100% { transform: translateY(0); }
}
/* (Legacy CSS-div анимации удалены — они применялись к SVG rect.layer
   через :last-child и заставляли верхний слой источника медленно
   растворяться сразу после клика. Все живые анимации слоёв теперь — выше:
   .bottle svg rect.layer.is-new + @keyframes layerFill.) */

/* ===== BOTTOM BAR =====
   Только одна кнопка («Ход назад»), выровнена по левому краю экрана. */
.bottom{
  flex:0 0 auto;
  display:flex;
  gap:10px;
  padding:10px 18px 18px;
  align-items:center;
  justify-content:flex-start;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  min-width:64px;height:56px;
  padding:0 18px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:16px;
  color:var(--text);
  font-family:inherit;font-size:14px;
  line-height:1;
  cursor:pointer;
  transition:transform .1s, background .15s, border-color .15s;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
.btn:active{transform:translateY(2px)}
.btn[disabled]{opacity:.4;cursor:not-allowed}
/* Иконка — flex-контейнер с центрированной SVG. Так glyph/SVG всегда
   точно по центру, а текст рядом сидит на той же воображаемой средней
   линии (line-height:1 у кнопки и justify-content:center у иконки). */
.btn .ico{
  width:22px;height:22px;
  display:inline-flex;align-items:center;justify-content:center;
  flex:0 0 auto;
}
.btn .ico svg{width:100%;height:100%;display:block}
.btn .btn-label{display:inline-flex;align-items:center;line-height:1}
/* Кнопка «Ход назад» — пошире, текст крупнее. */
.btn-undo{
  min-width:140px;
  padding:0 22px;
  font-size:15px;
  letter-spacing:.2px;
}
.btn-primary{background:linear-gradient(180deg,#ff7ac6,#b65bff);border-color:rgba(255,255,255,.3)}
.btn-bonus{background:linear-gradient(180deg,#ffd23f,#ff8a2b);color:#3b1300;border-color:#ffb44e}
.btn-bonus .ico-play{color:#3b1300}
.btn small{display:block;font-size:10px;opacity:.7;margin-top:2px}

/* ===== MODAL ===== */
.modal-wrap{
  position:fixed;inset:0;
  background:rgba(10,4,30,.7);
  display:none;
  align-items:center;justify-content:center;
  z-index:50;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.modal-wrap.open{display:flex}
.modal{
  background:linear-gradient(180deg,#3a1d72,#1a1238);
  border:1px solid var(--panel-border);
  border-radius:24px;
  padding:28px 26px 22px;
  width:min(86vw,360px);
  text-align:center;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.modal h2{font-size:28px;margin-bottom:8px;color:var(--accent)}
.modal p{color:var(--text-dim);margin-bottom:20px;font-size:14px;line-height:1.5}
.modal .btn{width:100%;height:54px;font-size:16px}

/* ===== RATE-US MODAL ===== */
.rateus-modal h2{margin-bottom:12px}
.rateus-stars{
  font-size:44px;
  color:#ffd23f;
  letter-spacing:6px;
  line-height:1;
  margin:6px 0 16px;
  text-shadow:0 4px 18px rgba(255,210,80,.55), 0 0 30px rgba(255,210,80,.25);
}
.rateus-text{
  color:var(--text-dim);
  font-size:15px;
  line-height:1.5;
  margin-bottom:22px;
}
.rateus-highlight{
  color:#ffd23f;
  font-weight:700;
  letter-spacing:.3px;
}
/* Текстовая «кнопка-ссылка» без подложки — для «Может позже». */
.btn-link{
  background:none;
  border:none;
  color:rgba(255,255,255,.5);
  font-family:inherit;
  font-size:13px;
  margin-top:12px;
  padding:8px 14px;
  cursor:pointer;
  transition:color .15s, transform .1s;
  letter-spacing:.2px;
}
.btn-link:hover{color:rgba(255,255,255,.8)}
.btn-link:active{transform:translateY(1px)}

/* ===== DEV PANEL ===== */
.dev{
  position:fixed;top:8px;left:8px;right:8px;bottom:8px;
  background:rgba(8,4,26,.96);
  border:1px solid var(--panel-border);
  border-radius:16px;
  z-index:100;
  display:none;
  flex-direction:column;
  padding:16px;
  font-size:12px;
  overflow:hidden;
}
.dev.open{display:flex}
.dev-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dev-head h3{font-size:14px;color:var(--accent)}
.dev-body{flex:1 1 auto;overflow:auto;padding-right:6px}
.dev-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.dev-row label{flex:0 0 130px;color:var(--text-dim)}
.dev input[type=number],.dev select{
  flex:1 1 80px;min-width:60px;padding:6px 8px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--panel-border);
  border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;
}
.dev input[type=checkbox]{transform:scale(1.2);margin-right:4px}
.dev .swatches{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.dev .sw{
  width:28px;height:28px;border-radius:8px;border:2px solid transparent;cursor:pointer;
  background:var(--sw-color);box-shadow:inset 0 0 0 1px rgba(0,0,0,.3)
}
.dev .sw.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,216,107,.4)}
.dev .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.dev .actions button{
  flex:1;min-width:120px;padding:10px;
  background:rgba(255,255,255,.08);border:1px solid var(--panel-border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;
}
.dev .actions .primary{background:linear-gradient(180deg,#ff7ac6,#b65bff);font-weight:bold}
.dev .actions .ghost{background:transparent}
.dev .actions .danger{background:rgba(255,91,115,.18);border-color:rgba(255,91,115,.4);color:#ffb0bd}
.dev .actions .danger:hover{background:rgba(255,91,115,.3)}

<script>
/* ============================================================
   GlitterSort — single-file game logic
   ------------------------------------------------------------
   Sections (Ctrl+F to jump):
     [LEVELS]   Палитра, дефолтные уровни, генераторы, endless
     [SOLVER]   BFS-решатель, dead-end detection
     [STATE]    Игровое состояние, ходы, undo, win-проверка
     [PERSIST]  localStorage save/load
     [RENDER]   Отрисовка колбочек и HUD
     [ADS]      Реклама (Native bridge / YaGames / Mock)
     [DEVPANEL] Редактор параметров уровня
     [APP]      Bootstrap, обработчики кликов, win flow
   ============================================================ */

/* ============================================================
   [SOLVER] — BFS shortest-path + dead-end detection.
   Portирован из RC_Colbs_v2/game/solver.js. Используется
   генератором random-tuned и (опционально) системой подсказок.
   ============================================================ */
window.Solver = (() => {
  function findShortestPath(initial, capacity, timeLimitMs = 1000, options = {}) {
    const multi = options.multiTransfer !== false;
    const t0 = performance.now();
    if (isSolved(initial, capacity)) {
      return { length: 0, explored: 1, time: 0, exhausted: true, firstMove: null };
    }
    const visited = new Set();
    visited.add(hashState(initial));
    const queue = [{ state: initial.map(b => [...b]), depth: 0, firstMove: null }];
    let head = 0;
    let bestLength = Infinity;
    let bestFirstMove = null;
    let explored = 0;
    let timedOut = false;
    let checkCtr = 0;

    while (head < queue.length) {
      if ((checkCtr++ & 0xFFF) === 0 && performance.now() - t0 > timeLimitMs) {
        timedOut = true;
        break;
      }
      const cur = queue[head++];
      if (cur.depth + 1 >= bestLength) continue;
      explored++;

      const moves = enumerateMoves(cur.state, capacity, multi);
      for (const m of moves) {
        const k = m.count || 1;
        for (let i = 0; i < k; i++) cur.state[m.to].push(cur.state[m.from].pop());
        const newDepth = cur.depth + 1;
        const lineFirst = cur.firstMove || { from: m.from, to: m.to, count: k };
        if (isSolved(cur.state, capacity)) {
          if (newDepth < bestLength) {
            bestLength = newDepth;
            bestFirstMove = lineFirst;
          }
          for (let i = 0; i < k; i++) cur.state[m.from].push(cur.state[m.to].pop());
          continue;
        }
        if (newDepth + 1 < bestLength) {
          const h = hashState(cur.state);
          if (!visited.has(h)) {
            visited.add(h);
            queue.push({
              state: cur.state.map(b => [...b]),
              depth: newDepth,
              firstMove: lineFirst,
            });
          }
        }
        for (let i = 0; i < k; i++) cur.state[m.from].push(cur.state[m.to].pop());
      }
    }
    return {
      length: bestLength === Infinity ? null : bestLength,
      explored,
      time: performance.now() - t0,
      exhausted: !timedOut,
      firstMove: bestFirstMove,
    };
  }

  function enumerateMoves(state, capacity, multi = true) {
    const N = state.length;
    const out = [];
    for (let a = 0; a < N; a++) {
      const sa = state[a];
      if (sa.length === 0) continue;
      const top = sa[sa.length - 1];
      let runLen = 0;
      for (let i = sa.length - 1; i >= 0 && sa[i] === top; i--) runLen++;
      for (let b = 0; b < N; b++) {
        if (a === b) continue;
        const sb = state[b];
        if (sb.length >= capacity) continue;
        if (sb.length > 0 && sb[sb.length - 1] !== top) continue;
        const room = capacity - sb.length;
        const count = multi ? Math.min(runLen, room) : 1;
        if (count <= 0) continue;
        out.push({ from: a, to: b, count });
      }
    }
    return out;
  }

  function isSolved(state, capacity) {
    return state.every(s =>
      s.length === 0 ||
      (s.length === capacity && s.every(c => c === s[0])));
  }

  function hashState(state) {
    return state.map(s => s.join(',')).join('|');
  }

  function findReachableDeadEnds(initial, capacity, options = {}) {
    const multi = options.multiTransfer !== false;
    const timeLimitMs = options.timeLimitMs ?? 2000;
    const t0 = performance.now();

    const reachable = new Set();
    const goals = [];
    const predecessors = new Map();

    const startHash = hashState(initial);
    reachable.add(startHash);
    if (isSolved(initial, capacity)) goals.push(startHash);

    const queue = [{ state: initial.map(b => [...b]), hash: startHash }];
    let head = 0;
    let timedOut = false;
    let checkCtr = 0;

    while (head < queue.length) {
      if ((checkCtr++ & 0xFFF) === 0 && performance.now() - t0 > timeLimitMs) {
        timedOut = true;
        break;
      }
      const cur = queue[head++];
      const moves = enumerateMoves(cur.state, capacity, multi);
      for (const m of moves) {
        const k = m.count || 1;
        for (let i = 0; i < k; i++) cur.state[m.to].push(cur.state[m.from].pop());
        const nextHash = hashState(cur.state);
        if (!reachable.has(nextHash)) {
          reachable.add(nextHash);
          if (isSolved(cur.state, capacity)) goals.push(nextHash);
          queue.push({ state: cur.state.map(b => [...b]), hash: nextHash });
        }
        let preds = predecessors.get(nextHash);
        if (!preds) { preds = new Set(); predecessors.set(nextHash, preds); }
        preds.add(cur.hash);
        for (let i = 0; i < k; i++) cur.state[m.from].push(cur.state[m.to].pop());
      }
    }
    if (timedOut) {
      return { ok:false, reachable:reachable.size, deadEnds:-1, exhausted:false, time:performance.now()-t0 };
    }
    if (goals.length === 0) {
      return { ok:false, reachable:reachable.size, deadEnds:reachable.size, exhausted:true, time:performance.now()-t0 };
    }
    const safe = new Set(goals);
    const safeQueue = [...goals];
    let safeHead = 0;
    while (safeHead < safeQueue.length) {
      const h = safeQueue[safeHead++];
      const preds = predecessors.get(h);
      if (!preds) continue;
      for (const p of preds) {
        if (!safe.has(p)) { safe.add(p); safeQueue.push(p); }
      }
    }
    const deadEnds = reachable.size - safe.size;
    return { ok: deadEnds === 0, reachable: reachable.size, deadEnds, exhausted: true, time: performance.now() - t0 };
  }

  return { findShortestPath, findReachableDeadEnds, isSolved, hashState };
})();

/* ============================================================
   [LEVELS] — палитра, 10 ручных уровней, генераторы V1/V2,
   endless mode.
   Portирован из RC_Colbs_v2/game/levels.js, адаптирован
   под палитру 8 цветов и ограничение "2-4 цвета максимум".
   ============================================================ */
window.Levels = (() => {
  // 11 цветов — поддерживает layouts до 12 колб (1 пустая, 11 цветов).
  const PALETTE = [
    'pink','orange','yellow','lime','teal','blue','purple','crimson',
    'cyan','mint','coral',
  ];

  // Hex-значения для подкраски swatch'ей в дев-панели (CSS-варианты не
  // достать из computed style без вставки в DOM, поэтому держим зеркало).
  const COLOR_HEX = {
    pink:'#ff5fa2', orange:'#ff8a2b', yellow:'#ffd23f', lime:'#9bdc2f',
    teal:'#22d3c8', blue:'#3a8bff',   purple:'#b65bff', crimson:'#ef3a5d',
    cyan:'#22ddff', mint:'#5be3a0',   coral:'#ff7b6b',
  };

  // 10 default levels. КРИТИЧЕСКОЕ ПРАВИЛО:
  //   colors_count === filled === sticks - emptyStick
  // Каждый цвет занимает ровно ОДНУ полную колбу (capacity единиц).
  // Никогда не должно быть 2+ полных колб одного цвета.
  // Прогрессия — увеличение sticks/capacity/colors, всегда emptyStick=1.
  // Прогрессия от 3 ходов (L1) до 31-32 ходов (L10), emptyStick=1, без бонуса.
  // ВСЕ bottles предгенерированы и захардкожены — одинаковы у всех игроков,
  // нет тяжёлой генерации на устройстве. Если когда-нибудь придётся
  // регенерировать — generator/seed/difficulty/tuningTimeoutMs оставлены
  // как метаданные, generate() их использует, только если bottles нет.
  // Оптимум каждого уровня указан в комментарии (проверено BFS-solver).
  const DEFAULT_LEVELS = [
    // L1 — туториал, optimal=3
    { level: 1,  sticks: 3,  capacity: 2, emptyStick: 1, difficulty: 3,
      colours: ['pink','blue'],
      generator:'random-tuned', tuningTimeoutMs: 3000, seed: 1001,
      bottles: [['pink','blue'],['blue','pink'],[]] },
    // L2 — optimal=4
    { level: 2,  sticks: 4,  capacity: 2, emptyStick: 1, difficulty: 6,
      colours: ['pink','blue','orange'],
      generator:'random-tuned', tuningTimeoutMs: 3000, seed: 2001,
      bottles: [['pink','orange'],['blue','pink'],['orange','blue'],[]] },
    // L3 — optimal=8
    { level: 3,  sticks: 4,  capacity: 3, emptyStick: 1, difficulty: 9,
      colours: ['pink','blue','orange'],
      generator:'random-tuned', tuningTimeoutMs: 4000, seed: 3001,
      bottles: [['pink','blue','pink'],['orange','blue','orange'],['pink','blue','orange'],[]] },
    // L4 — optimal=10
    { level: 4,  sticks: 5,  capacity: 3, emptyStick: 1, difficulty: 12,
      colours: ['pink','blue','orange','lime'],
      generator:'random-tuned', tuningTimeoutMs: 4000, seed: 4001,
      bottles: [['lime','orange','lime'],['pink','orange','blue'],['pink','lime','pink'],['blue','orange','blue'],[]] },
    // L5 — optimal=13
    { level: 5,  sticks: 6,  capacity: 3, emptyStick: 1, difficulty: 15,
      colours: ['pink','orange','yellow','lime','teal'],
      generator:'random-tuned', tuningTimeoutMs: 5000, seed: 5001,
      bottles: [['lime','teal','yellow'],['yellow','orange','teal'],['yellow','orange','pink'],['teal','lime','pink'],['lime','orange','pink'],[]] },
    // L6 — optimal=18
    { level: 6,  sticks: 7,  capacity: 4, emptyStick: 1, difficulty: 18,
      colours: ['pink','orange','yellow','lime','teal','blue'],
      generator:'random-tuned', tuningTimeoutMs: 5000, seed: 6001,
      bottles: [['pink','lime','yellow','lime'],['teal','blue','lime','orange'],['orange','pink','teal','yellow'],['blue','teal','pink','blue'],['teal','orange','orange','lime'],['yellow','pink','yellow','blue'],[]] },
    // L7 — optimal=22
    { level: 7,  sticks: 8,  capacity: 4, emptyStick: 1, difficulty: 22,
      colours: ['pink','orange','yellow','lime','teal','blue','purple'],
      generator:'random-tuned', tuningTimeoutMs: 6000, seed: 7001,
      bottles: [['yellow','blue','teal','blue'],['lime','pink','blue','teal'],['lime','yellow','purple','pink'],['blue','teal','orange','pink'],['yellow','purple','yellow','teal'],['pink','lime','orange','purple'],['orange','orange','purple','lime'],[]] },
    // L8 — optimal=25
    { level: 8,  sticks: 9,  capacity: 4, emptyStick: 1, difficulty: 25,
      colours: ['pink','orange','yellow','lime','teal','blue','purple','crimson'],
      generator:'random-tuned', tuningTimeoutMs: 8000, seed: 8001,
      bottles: [['pink','crimson','blue','lime'],['purple','pink','purple','crimson'],['orange','orange','yellow','orange'],['lime','lime','crimson','teal'],['purple','yellow','teal','teal'],['yellow','teal','blue','pink'],['lime','blue','pink','blue'],['crimson','purple','yellow','orange'],[]] },
    // L9 — optimal=28
    { level: 9,  sticks: 10, capacity: 4, emptyStick: 1, difficulty: 28,
      colours: ['pink','orange','yellow','lime','teal','blue','purple','crimson','cyan'],
      generator:'random-tuned', tuningTimeoutMs: 8000, seed: 9001,
      bottles: [['pink','yellow','cyan','yellow'],['yellow','purple','teal','lime'],['cyan','teal','blue','purple'],['teal','blue','yellow','orange'],['lime','orange','lime','pink'],['orange','lime','crimson','teal'],['cyan','orange','purple','crimson'],['purple','crimson','pink','cyan'],['crimson','pink','blue','blue'],[]] },
    // L10 — optimal=31 (целились в 32; BFS остановился на 31 за 10с)
    { level: 10, sticks: 12, capacity: 4, emptyStick: 1, difficulty: 32,
      colours: ['pink','orange','yellow','lime','teal','blue','purple','crimson','cyan','mint','coral'],
      generator:'random-tuned', tuningTimeoutMs: 10000, seed: 10001,
      bottles: [['yellow','teal','pink','lime'],['teal','crimson','teal','blue'],['pink','yellow','blue','blue'],['lime','purple','lime','purple'],['orange','orange','pink','coral'],['yellow','orange','yellow','blue'],['purple','coral','purple','crimson'],['coral','cyan','pink','mint'],['cyan','mint','crimson','teal'],['mint','cyan','cyan','orange'],['crimson','lime','coral','mint'],[]] },
  ];

  const runtimeOverrides = {};
  function setRuntimeOverride(n, cfg) { if (cfg) runtimeOverrides[n] = cfg; else delete runtimeOverrides[n]; }
  function clearRuntimeOverride(n) { delete runtimeOverrides[n]; }
  function clearAllRuntimeOverrides() {
    for (const k of Object.keys(runtimeOverrides)) delete runtimeOverrides[k];
  }
  function getAllRuntimeOverrides() { return { ...runtimeOverrides }; }
  function getRuntimeOverride(n) { return runtimeOverrides[n] || null; }
  function getLevelCount() { return DEFAULT_LEVELS.length; }

  /**
   * Свежий уровень-заготовка: минимальные размеры и ПУСТАЯ раскладка
   * (`bottles: [[],[],[]]`). Пользователь крутит параметры и жмёт
   * «Сгенерировать», чтобы заполнить колбочки. Размеры умышленно
   * фиксированы независимо от позиции вставки.
   */
  function makeFreshLevelTemplate() {
    return {
      sticks: 3, capacity: 2, emptyStick: 1,
      reward: 100, difficulty: 1,
      colours: ['pink', 'blue'],
      generator: 'random-tuned',
      tuningTimeoutMs: 5000,
      seed: 1007,
      bottles: [[], [], []],
    };
  }

  /** Вставить пустой уровень после уровня n; сдвигает runtime overrides. */
  function insertLevelAfter(n) {
    const idx = Math.max(0, Math.min(DEFAULT_LEVELS.length - 1, n - 1));
    const fresh = makeFreshLevelTemplate();
    DEFAULT_LEVELS.splice(idx + 1, 0, fresh);
    const sortedKeys = Object.keys(runtimeOverrides).map(Number).sort((a, b) => b - a);
    for (const k of sortedKeys) {
      if (k >= n + 1) {
        runtimeOverrides[k + 1] = runtimeOverrides[k];
        delete runtimeOverrides[k];
      }
    }
    renumber();
    if (window.Persist?.shiftGenMeta) Persist.shiftGenMeta(n + 1, +1);
    runtimeOverrides[n + 1] = { ...makeFreshLevelTemplate(), level: n + 1 };
  }

  /** Удалить уровень n; сдвигает overrides. Не даст удалить последний. */
  function removeLevel(n) {
    if (DEFAULT_LEVELS.length <= 1) return false;
    const idx = Math.max(0, Math.min(DEFAULT_LEVELS.length - 1, n - 1));
    DEFAULT_LEVELS.splice(idx, 1);
    delete runtimeOverrides[n];
    const sortedKeys = Object.keys(runtimeOverrides).map(Number).sort((a, b) => a - b);
    for (const k of sortedKeys) {
      if (k > n) {
        runtimeOverrides[k - 1] = runtimeOverrides[k];
        delete runtimeOverrides[k];
      }
    }
    renumber();
    if (window.Persist?.shiftGenMeta) Persist.shiftGenMeta(n, -1);
    return true;
  }

  function renumber() {
    DEFAULT_LEVELS.forEach((lvl, i) => { lvl.level = i + 1; });
  }

  /**
   * Endless mode (L11+) — параметры зашиты в баланс игры по требованию
   * пользователя:
   *   - 8-12 колб случайно
   *   - 1 пустая, capacity всегда 4
   *   - максимум оптимума линейно от 24 (8 колб) до 42 (12 колб)
   *   - 1 из 3 уровней с requireBonus=true
   *   - tuningTimeoutMs = 1000 (быстрая генерация)
   * Конфиг детерминирован по n: один и тот же уровень = одни и те же
   * параметры. Bottles генерируются генератором и кэшируются в savedRun.
   */
  const ENDLESS_CONFIG = {
    sticksMin: 8,
    sticksMax: 12,
    capacity: 4,
    emptyStick: 1,
    // Линейная интерполяция максимального оптимума:
    //   sticks=8  → up to 24
    //   sticks=12 → up to 42
    optimalAt8: 24,
    optimalAt12: 42,
    tuningTimeoutMs: 1000,
    bonusRatio: 1 / 3,  // 1 из 3 уровней решаемы только с +1 колбой
  };

  const _endlessCache = {};
  function generateEndlessConfig(n) {
    const cfg = ENDLESS_CONFIG;
    const seed = (n * 9173 + 31) | 0;
    const rng = mulberry32(seed);
    // Случайное число колб в [sticksMin..sticksMax].
    const sticksRange = cfg.sticksMax - cfg.sticksMin + 1;
    const sticks = cfg.sticksMin + Math.floor(rng() * sticksRange);
    const filled = sticks - cfg.emptyStick;
    // Линейная интерполяция: между optimalAt8 (8 колб) и optimalAt12 (12 колб).
    const t = (sticks - 8) / (12 - 8);
    const maxOptimal = Math.round(cfg.optimalAt8 + t * (cfg.optimalAt12 - cfg.optimalAt8));
    // Цель — где-то «до максимума»: от 60% до 100% этого ориентира.
    const minOptimal = Math.max(8, Math.round(maxOptimal * 0.6));
    const difficulty = minOptimal + Math.floor(rng() * (maxOptimal - minOptimal + 1));
    const requireBonus = rng() < cfg.bonusRatio;
    const colours = shuffleInPlace([...PALETTE], rng).slice(0, filled);
    return {
      sticks,
      capacity: cfg.capacity,
      emptyStick: cfg.emptyStick,
      difficulty,
      colours,
      generator: 'random-tuned',
      tuningTimeoutMs: cfg.tuningTimeoutMs,
      seed,
      requireBonus,
      endless: true,
    };
  }

  function getParams(n) {
    if (runtimeOverrides[n]) return { ...runtimeOverrides[n], level: n };
    const custom = window.Persist && window.Persist.loadCustomLevel
      ? window.Persist.loadCustomLevel(n) : null;
    if (custom) return { ...custom, level: n };
    if (n > DEFAULT_LEVELS.length) {
      if (!_endlessCache[n]) _endlessCache[n] = generateEndlessConfig(n);
      return { ..._endlessCache[n], level: n };
    }
    const idx = Math.max(0, Math.min(DEFAULT_LEVELS.length - 1, n - 1));
    return { ...DEFAULT_LEVELS[idx], level: n };
  }

  // -------- PRNG + helpers --------
  function mulberry32(seed) {
    let s = seed | 0;
    return function () {
      s = (s + 0x6D2B79F5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function shuffleInPlace(arr, rng) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  function clampDifficulty(d) {
    if (!Number.isFinite(d)) return 50;
    return Math.max(1, Math.min(1000, d | 0));
  }
  function clampTimeout(ms) {
    if (!Number.isFinite(ms)) return 5000;
    return Math.max(100, Math.min(600_000, ms | 0));
  }
  function hashState(state) { return state.map(s => s.join(',')).join('|'); }

  /**
   * Generator dispatcher:
   *   1. params.bottles given       → use verbatim
   *   2. params.generator='random-tuned' → V2 (random + BFS-tuned)
   *   3. otherwise                  → V1 (reverse-shuffle, default)
   *
   * Если генератор выдал уже решённую раскладку (бывает на маленьких
   * полях, когда compact-pass случайно собирает всё обратно) — делаем
   * до 6 ретраев с бампом seed и difficulty, чтобы старт уровня всегда
   * требовал хотя бы один ход.
   */
  function generate(params) {
    if (Array.isArray(params.bottles)) {
      return permuteEmptyToEnd(params.bottles.map(s => [...s]));
    }
    let bottles;
    const baseSeed = params.seed | 0;
    const baseDiff = params.difficulty | 0;
    for (let attempt = 0; attempt < 6; attempt++) {
      const p = {
        ...params,
        seed: baseSeed + attempt * 113,
        difficulty: baseDiff + attempt * 2,
      };
      bottles = params.generator === 'random-tuned'
        ? generateRandomTuned(p).bottles
        : reverseShuffleFromSolved(p);
      if (!Solver.isSolved(bottles, p.capacity)) break;
    }
    return permuteEmptyToEnd(bottles);
  }

  function permuteEmptyToEnd(sticks) {
    const filled = [], empty = [];
    for (const s of sticks) (s.length === 0 ? empty : filled).push(s);
    return [...filled, ...empty];
  }

  /**
   * Подбор цветов под filled: ровно `filled` уникальных цветов.
   * Если params.colours валиден (массив длины ≥ filled, без повторов) —
   * берём первые filled. Иначе детерминированно сэмплим из палитры.
   * Кидает ошибку, если палитра недостаточна.
   */
  function pickColours(params, filled, rng) {
    if (filled > PALETTE.length) {
      throw new Error(`Палитра содержит ${PALETTE.length} цветов, а нужно ${filled}`);
    }
    if (Array.isArray(params.colours)
        && params.colours.length >= filled
        && new Set(params.colours.slice(0, filled)).size === filled
        && params.colours.slice(0, filled).every(c => PALETTE.includes(c))) {
      return params.colours.slice(0, filled);
    }
    return shuffleInPlace([...PALETTE], rng).slice(0, filled);
  }

  // -------- Generator V1: reverse-shuffle from solved --------
  function reverseShuffleFromSolved(params) {
    const { sticks, capacity, emptyStick, level } = params;
    const filled = sticks - emptyStick;
    const seed = (params.seed != null ? params.seed | 0 : (level | 0) * 1000 + 7);
    const rng = mulberry32(seed);
    const colours = pickColours(params, filled, rng);
    // Solved layout: каждая filled-колба = одна полная (capacity штук) одного цвета.
    // Это и есть инвариант "1 цвет = 1 полная колба".
    const state = [];
    for (let i = 0; i < filled; i++) {
      const arr = [];
      for (let j = 0; j < capacity; j++) arr.push(colours[i]);
      state.push(arr);
    }
    for (let i = 0; i < emptyStick; i++) state.push([]);
    return reverseShuffle(state, capacity, clampDifficulty(params.difficulty), rng);
  }

  function reverseShuffle(state, capacity, difficulty, rng) {
    const N = state.length;
    const initialEmpty = state.filter(s => s.length === 0).length;
    const visited = new Set();
    visited.add(hashState(state));
    let lastMove = null;
    let accepted = 0, attempts = 0;
    const maxAttempts = difficulty * 8;
    while (accepted < difficulty && attempts < maxAttempts) {
      attempts++;
      const a = Math.floor(rng() * N);
      const b = Math.floor(rng() * N);
      if (a === b) continue;
      if (state[a].length === 0) continue;
      if (state[b].length >= capacity) continue;
      if (lastMove && lastMove.from === b && lastMove.to === a) continue;
      if (lastMove && lastMove.from === a && lastMove.to === b) continue;
      const donut = state[a][state[a].length - 1];
      // Решаемость forward-инверсии: после reverse-pop источник либо пустеет
      // полностью, либо его новый верх того же цвета. Иначе forward inverse
      // попытался бы класть `donut` обратно на чужой цвет — невалидно.
      if (state[a].length > 1 && state[a][state[a].length - 2] !== donut) continue;
      state[a].pop();
      state[b].push(donut);
      const h = hashState(state);
      if (visited.has(h)) { state[b].pop(); state[a].push(donut); continue; }
      visited.add(h);
      lastMove = { from: a, to: b };
      accepted++;
    }
    // compact pass: restore empty buffer count
    let safety = 200;
    let emptyNow = state.filter(s => s.length === 0).length;
    while (emptyNow < initialEmpty && safety-- > 0) {
      let src = -1, srcSize = Infinity;
      for (let i = 0; i < N; i++) {
        if (state[i].length > 0 && state[i].length < srcSize) { srcSize = state[i].length; src = i; }
      }
      if (src < 0) break;
      let progressed = false;
      for (let step = 0; step < srcSize; step++) {
        const candidates = [];
        for (let j = 0; j < N; j++) if (j !== src && state[j].length < capacity) candidates.push(j);
        if (candidates.length === 0) break;
        const dst = candidates[Math.floor(rng() * candidates.length)];
        const donut = state[src].pop();
        state[dst].push(donut);
        visited.add(hashState(state));
        progressed = true;
      }
      if (!progressed) break;
      emptyNow = state.filter(s => s.length === 0).length;
    }
    return state;
  }

  // -------- Generator V2: random + BFS-tuned --------
  let _lastTuningMeta = null;

  /**
   * Random-tuned generator. Гонится пока не выйдет бюджет `tuningTimeoutMs`,
   * подбирает раскладку с BFS-оптимумом равным `difficulty`.
   *
   * Опционально: `requireBonus: true` → принимаются ТОЛЬКО раскладки,
   * которые НЕРЕШАЕМЫ при текущем числе пустых колб, но РЕШАЕМЫ если
   * добавить одну дополнительную пустую колбу (имитация активации
   * бонуса «+1 колба за рекламу»). Это даёт уровень-«нельзя без бонуса».
   */
  function generateRandomTuned(params) {
    const target = clampDifficulty(params.difficulty);
    const timeoutMs = clampTimeout(params.tuningTimeoutMs);
    const seed = (params.seed != null ? params.seed | 0 : (params.level | 0) * 1000 + 7);
    const rng = mulberry32(seed);
    const capacity = params.capacity;
    const multiTransfer = params.multiTransfer !== false;
    const requireBonus = params.requireBonus === true;
    const t0 = performance.now();

    let best = null;
    let attempts = 0, solvableAttempts = 0;

    while (true) {
      const elapsed = performance.now() - t0;
      if (elapsed >= timeoutMs) break;
      const layout = randomLayout(params, rng);
      attempts++;
      if (Solver.isSolved(layout, capacity)) continue;
      const remaining = timeoutMs - elapsed;
      const perAttempt = Math.min(remaining, 1000);
      const base = Solver.findShortestPath(layout, capacity, perAttempt, { multiTransfer });

      let optimalLength;
      if (requireBonus) {
        // Базовый layout должен быть НЕРЕШАЕМ (BFS прошёл всё и не нашёл goal).
        if (base.length !== null) continue;          // решаем без бонуса — мимо
        if (!base.exhausted) continue;               // timeout — не можем подтвердить
        // С +1 пустой колбой раскладка должна быть РЕШАЕМОЙ.
        const bonusLayout = layout.map(s => [...s]);
        bonusLayout.push([]);
        const remaining2 = timeoutMs - (performance.now() - t0);
        if (remaining2 <= 0) break;
        const bonus = Solver.findShortestPath(bonusLayout, capacity,
          Math.min(remaining2, 1000), { multiTransfer });
        if (bonus.length === null) continue;         // даже с +1 нерешаем — мимо
        optimalLength = bonus.length;
      } else {
        if (base.length === null) continue;
        optimalLength = base.length;
      }
      solvableAttempts++;

      const distance = Math.abs(optimalLength - target);
      if (!best || distance < best.distance) {
        best = { bottles: layout, optimalLength, distance };
        if (distance === 0) break;
      }
    }
    const elapsedMs = performance.now() - t0;

    if (!best) {
      _lastTuningMeta = {
        attempts, solvableAttempts, elapsedMs,
        optimalLength: null, distance: null,
        achievedExact: false, fallback: true,
        requireBonusFailed: requireBonus,
        requireBonus,
        target,
      };
      return { bottles: reverseShuffleFromSolved(params), ..._lastTuningMeta };
    }
    _lastTuningMeta = {
      attempts, solvableAttempts, elapsedMs,
      optimalLength: best.optimalLength,
      distance: best.distance,
      achievedExact: best.distance === 0,
      fallback: false,
      requireBonus,
      target,
    };
    return { bottles: best.bottles, ..._lastTuningMeta };
  }

  function randomLayout(params, rng) {
    const { sticks, capacity, emptyStick } = params;
    const filled = sticks - emptyStick;
    // Ровно `filled` уникальных цветов: каждый цвет = capacity пончиков
    // = ровно 1 полная колба в решённом состоянии.
    const colours = pickColours(params, filled, rng);
    // Каждый цвет имеет ровно `capacity` пончиков; раскладка перемешана.
    const flat = [];
    for (const c of colours) for (let i = 0; i < capacity; i++) flat.push(c);
    shuffleInPlace(flat, rng);
    const state = [];
    for (let i = 0; i < filled; i++) state.push(flat.slice(i * capacity, (i + 1) * capacity));
    for (let i = 0; i < emptyStick; i++) state.push([]);
    return state;
  }

  function getLastTuningMeta() { return _lastTuningMeta; }

  return {
    PALETTE, COLOR_HEX, DEFAULT_LEVELS, ENDLESS_CONFIG,
    getParams, generate,
    generateRandomTuned, getLastTuningMeta,
    setRuntimeOverride, clearRuntimeOverride, getRuntimeOverride,
    getAllRuntimeOverrides, clearAllRuntimeOverrides,
    insertLevelAfter, removeLevel, getLevelCount,
  };
})();

/* ============================================================
   [STATE] — игровое состояние, ходы, undo, win-проверка.
   Адаптирован из RC_Colbs_v2/game/state.js. Убрана валюта
   (currency/tweezers) — в нашей игре ходы бесплатные. Добавлен
   bonusUsedThisLevel и addBonusBottle().
   ============================================================ */
window.State = (() => {
  let state = null;
  function deepCopy(arr) { return arr.map(s => [...s]); }

  function init({ level, capacity, sticks }) {
    state = {
      level,
      capacity,
      sticks,                   // string[][]
      initial: deepCopy(sticks),
      selected: null,
      moves: 0,                 // счётчик совершённых ходов
      history: [],              // стек для undo
      bonusUsedThisLevel: false,
    };
    return state;
  }
  function get() { return state; }
  function topColor(stack) { return stack.length ? stack[stack.length - 1] : null; }

  function isCompletedStack(stack, capacity) {
    return stack.length === capacity && stack.length > 0 && stack.every(c => c === stack[0]);
  }

  function canMove(src, dst) {
    if (!state || src === dst) return false;
    const a = state.sticks[src], b = state.sticks[dst];
    if (!a || !b) return false;
    if (a.length === 0) return false;
    if (isCompletedStack(a, state.capacity)) return false;
    if (b.length >= state.capacity) return false;
    if (b.length === 0) return true;
    return topColor(a) === topColor(b);
  }

  function move(src, dst) {
    if (!canMove(src, dst)) return 0;
    const a = state.sticks[src], b = state.sticks[dst];
    const top = a[a.length - 1];
    let runLen = 0;
    for (let i = a.length - 1; i >= 0 && a[i] === top; i--) runLen++;
    const room = state.capacity - b.length;
    const k = Math.min(runLen, room);
    for (let i = 0; i < k; i++) b.push(a.pop());
    state.moves++;
    state.history.push({ src, dst, count: k, color: top });
    // Маркер «последний add» — Render использует его, чтобы навесить
    // .is-new на свежие layers и анимировать наполнение.
    state.lastAdded = { idx: dst, count: k, color: top };
    return k;
  }

  function undo() {
    if (!state || state.history.length === 0) return false;
    const last = state.history.pop();
    const count = last.count || 1;
    for (let i = 0; i < count; i++) state.sticks[last.src].push(state.sticks[last.dst].pop());
    state.selected = null;
    if (state.moves > 0) state.moves--;
    return true;
  }

  function clickStick(idx) {
    if (!state) return 'invalid';
    if (state.selected === null) {
      if (state.sticks[idx].length === 0) return 'invalid';
      if (isCompletedStack(state.sticks[idx], state.capacity)) return 'locked';
      state.selected = idx;
      return 'selected';
    }
    if (state.selected === idx) {
      state.selected = null;
      return 'deselected';
    }
    const src = state.selected;
    const moved = move(src, idx);
    if (moved > 0) {
      state.selected = null;
      return 'moved';
    }
    // Перелив не получился (приёмник не подходит по цвету или заполнен).
    // Трактуем как «передумал и выбираю другую колбу»: если новая колба
    // годится для выбора — переключаем selection на неё; если это пустая
    // или собранная — просто снимаем старое выделение.
    const target = state.sticks[idx];
    if (target.length === 0) {
      state.selected = null;
      return 'deselected';
    }
    if (isCompletedStack(target, state.capacity)) {
      state.selected = null;
      return 'locked';
    }
    state.selected = idx;
    return 'switched';
  }

  function isWon() {
    if (!state) return false;
    let total = 0;
    for (const s of state.sticks) total += s.length;
    if (total === 0) return false;
    return state.sticks.every(s =>
      s.length === 0 || (s.length === state.capacity && s.every(c => c === s[0]))
    );
  }

  function restart() {
    if (!state) return;
    state.sticks = deepCopy(state.initial);
    state.selected = null;
    state.history = [];
    state.moves = 0;
    state.bonusUsedThisLevel = false;
  }

  /**
   * Добавить пустую колбочку (бонус за rewarded ad). Один раз на уровень.
   * Колба добавляется в конец массива; initial тоже обновляется, чтобы
   * Restart не убрал бонус.
   */
  function addBonusBottle() {
    if (!state || state.bonusUsedThisLevel) return false;
    state.sticks.push([]);
    state.initial.push([]);
    state.bonusUsedThisLevel = true;
    state.selected = null;
    return true;
  }

  return {
    init, get, canMove, move, undo, clickStick, isWon, restart,
    addBonusBottle, isCompletedStack, deepCopy,
  };
})();

/* ============================================================
   [PERSIST] — localStorage save/load.
   Ключ "glitterSort.v1". Хранит уровень, статистику, кастомные
   уровни из дев-панели, счётчик interstitial.
   ============================================================ */
window.Persist = (() => {
  const KEY = 'glitterSort.v1';
  const DEFAULTS = {
    version: 2,
    level: 1,
    totalCompleted: 0,
    interstitialCounter: 0,
    customLevels: {},        // {n: {sticks, capacity, ...}}
    settings: { sound: true },
    stats: { totalMoves: 0, undoUsed: 0, bonusUsed: 0 },
    // savedRun — текущее состояние активного уровня. Хранит сгенерированную
    // раскладку, текущее положение цветов и историю ходов, чтобы перезаход
    // в приложение восстанавливал поле и позволял делать «Ход назад» до
    // начала уровня. Очищается при победе.
    savedRun: null,
    // RateUs: счётчик игровых сессий (App.start инкрементит); флаг что
    // L3-триггер уже отстрелял (одноразовый); флаг что игрок нажал
    // «Оценить» (после этого окно больше не показывается никогда).
    sessionCount: 0,
    rateUsShownAtL3: false,
    rateUsCompleted: false,
  };

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return { ...DEFAULTS };
      const parsed = JSON.parse(raw);
      // shallow merge с дефолтами на случай новых полей в будущих версиях
      return {
        ...DEFAULTS, ...parsed,
        settings: { ...DEFAULTS.settings, ...(parsed.settings || {}) },
        stats:    { ...DEFAULTS.stats,    ...(parsed.stats    || {}) },
        customLevels: parsed.customLevels || {},
      };
    } catch (e) {
      console.warn('[Persist] load failed, using defaults', e);
      return { ...DEFAULTS };
    }
  }

  function save(data) {
    try {
      localStorage.setItem(KEY, JSON.stringify(data));
    } catch (e) {
      console.warn('[Persist] save failed', e);
    }
  }

  // Custom level configs (overrides from dev panel, persist across reloads)
  function loadCustomLevel(n) {
    const data = load();
    return data.customLevels[n] || null;
  }
  function saveCustomLevel(n, cfg) {
    const data = load();
    data.customLevels[n] = cfg;
    save(data);
  }
  function clearCustomLevel(n) {
    const data = load();
    delete data.customLevels[n];
    save(data);
  }
  function clearAll() {
    try { localStorage.removeItem(KEY); } catch (e) {}
  }

  // Interstitial cadence: показывать каждые 2 пройденных уровня
  // (LEGACY: новой логикой не используется, оставлен для совместимости)
  function bumpInterstitialCounter() {
    const data = load();
    data.interstitialCounter = (data.interstitialCounter || 0) + 1;
    save(data);
    return data.interstitialCounter;
  }
  function shouldShowInterstitial(counter) {
    return counter > 0 && counter % 2 === 0;
  }

  // Recovery flag для случая, когда мы открыли интерстишл, но игрок
  // закрыл приложение до того как реклама зарезолвилась. На следующем
  // запуске App.start читает этот timestamp и, если прошло меньше 5 минут,
  // сразу показывает рекламу перед загрузкой уровня (см. требование 4 ТЗ).
  function markInterstitialPending(ts) {
    const data = load();
    data.interstitialPendingAt = ts;
    save(data);
  }
  function clearInterstitialPending() {
    const data = load();
    delete data.interstitialPendingAt;
    save(data);
  }
  function loadInterstitialPending() {
    const data = load();
    return data.interstitialPendingAt || 0;
  }

  // savedRun — снэпшот текущего активного уровня. Содержит:
  //   level         — номер уровня
  //   params        — оригинальные параметры генерации (для L11+ — это и
  //                   есть «балансовый» seed/sticks/diff/requireBonus)
  //   initialBottles— начальное положение (для определения «уровень в
  //                   исходном состоянии» — undo может крутить до сюда)
  //   currentBottles— текущее положение цветов
  //   history       — стек {src,dst,count,color} ходов от initial к current
  //   moves         — счётчик пройденных ходов
  //   bonusUsedThisLevel
  //   interstitialFlagged — игрок дёргал уровень (для политики рекламы)
  //   optimalSteps  — BFS-оптимум исходной раскладки (для HUD сложности)
  //   requireBonus  — флаг "решаемо только с +1 колбой"
  function saveSavedRun(run) {
    const data = load();
    data.savedRun = run;
    save(data);
  }
  function loadSavedRun() {
    const data = load();
    return data.savedRun || null;
  }
  function clearSavedRun() {
    const data = load();
    data.savedRun = null;
    save(data);
  }
  function updateSavedRun(patch) {
    const data = load();
    if (!data.savedRun) return;
    data.savedRun = { ...data.savedRun, ...patch };
    save(data);
  }

  // Generator meta — отдельный ключ. Хранит "человеко-читаемое" резюме
  // последней генерации для каждого уровня (attempts/optimal/distance/…),
  // переживает Persist.clear() игрового прогресса.
  const META_KEY = 'glitterSort.genMeta.v1';
  function loadGenMeta(n) {
    try {
      const raw = localStorage.getItem(META_KEY);
      if (!raw) return null;
      const all = JSON.parse(raw);
      return all[n] || null;
    } catch (e) { return null; }
  }
  function saveGenMeta(n, meta) {
    try {
      const raw = localStorage.getItem(META_KEY);
      const all = raw ? JSON.parse(raw) : {};
      all[n] = meta;
      localStorage.setItem(META_KEY, JSON.stringify(all));
    } catch (e) {}
  }
  function shiftGenMeta(fromN, delta) {
    try {
      const raw = localStorage.getItem(META_KEY);
      if (!raw) return;
      const all = JSON.parse(raw);
      const next = {};
      for (const k of Object.keys(all)) {
        const n = +k;
        next[n >= fromN ? n + delta : n] = all[k];
      }
      localStorage.setItem(META_KEY, JSON.stringify(next));
    } catch (e) {}
  }
  // Hard reset — стирает ВСЁ (прогресс + meta), используется кнопкой
  // "Reset всё" в дев-панели.
  function clear() {
    try {
      localStorage.removeItem(KEY);
      localStorage.removeItem(META_KEY);
    } catch (e) {}
  }

  return {
    KEY, DEFAULTS, load, save,
    loadCustomLevel, saveCustomLevel, clearCustomLevel, clearAll, clear,
    loadGenMeta, saveGenMeta, shiftGenMeta,
    bumpInterstitialCounter, shouldShowInterstitial,
    markInterstitialPending, clearInterstitialPending, loadInterstitialPending,
    saveSavedRun, loadSavedRun, clearSavedRun, updateSavedRun,
  };
})();

/* ============================================================
   [ADS] — рекламная абстракция с тремя backend'ами:
     1. Native — html2apk wrapper экспонирует window.YandexAds и
        вызывает window.__yandexAdsCallback по результатам.
     2. YaGames — window.YaGames для веб-публикации на Yandex Games.
     3. Mock — для dev-режима (открытие index.html файлом).
   Контракт нативного wrapper'а описан в docs/ADS.md.
   ============================================================ */
window.Ads = (() => {
  // Ad-unit IDs из Yandex Mobile Ads (partner.yandex.ru/mobile-ads).
  const UNIT_INTERSTITIAL = 'R-M-19273571-2';
  const UNIT_REWARDED     = 'R-M-19273571-1';

  let backend = 'mock';
  let ysdk = null;
  // Хэндлеры для callback'ов от нативного бриджа
  let pendingInterstitial = null;
  let pendingRewarded = null;

  function init() {
    if (window.YandexAds && typeof window.YandexAds.showInterstitial === 'function') {
      backend = 'native';
      window.__yandexAdsCallback = (kind, event) => {
        if (kind === 'interstitial' && pendingInterstitial) {
          pendingInterstitial();
          pendingInterstitial = null;
        }
        if (kind === 'rewarded' && pendingRewarded) {
          pendingRewarded(event === 'rewarded');
          pendingRewarded = null;
        }
      };
      console.log('[Ads] backend=native (YandexAds bridge)');
      // Preload первой пары реклам, чтобы первый показ был мгновенным.
      try {
        window.YandexAds.preloadInterstitial(UNIT_INTERSTITIAL);
        window.YandexAds.preloadRewarded(UNIT_REWARDED);
      } catch (e) { console.warn('[Ads] preload skipped:', e); }
      return Promise.resolve();
    }
    if (window.YaGames && typeof window.YaGames.init === 'function') {
      return window.YaGames.init().then(s => {
        ysdk = s;
        backend = 'yagames';
        console.log('[Ads] backend=yagames');
      }).catch(err => {
        console.warn('[Ads] YaGames init failed, falling back to mock', err);
        backend = 'mock';
      });
    }
    backend = 'mock';
    console.log('[Ads] backend=mock (dev)');
    return Promise.resolve();
  }

  /**
   * Заранее прогревает кеш интерстишла. На native — native wrapper и так
   * выполняет preload в onAdDismissed, но дополнительный вызов безопасен
   * (повторный preload игнорируется или просто рефрешит кэш). На yagames
   * и mock — no-op (yagames держит свой кэш, mock не нужен).
   * Вызывается из App.onWin (когда показывается модал победы) — даём 1-2
   * секунды на подгрузку перед тем как игрок нажмёт «Дальше».
   */
  function preloadInterstitial() {
    if (backend === 'native' && window.YandexAds && typeof window.YandexAds.preloadInterstitial === 'function') {
      try { window.YandexAds.preloadInterstitial(UNIT_INTERSTITIAL); } catch (e) {}
    }
  }

  function showInterstitial() {
    if (backend === 'native') {
      return new Promise(resolve => {
        pendingInterstitial = resolve;
        try { window.YandexAds.showInterstitial(UNIT_INTERSTITIAL); }
        catch (e) { console.warn('[Ads] native interstitial failed', e); pendingInterstitial = null; resolve(); }
      });
    }
    if (backend === 'yagames' && ysdk) {
      return new Promise(resolve => {
        ysdk.adv.showFullscreenAdv({
          callbacks: { onClose: () => resolve(), onError: () => resolve() },
        });
      });
    }
    // mock
    return new Promise(resolve => {
      console.log('[Ads] showInterstitial mock');
      setTimeout(resolve, 600);
    });
  }

  function showRewarded() {
    if (backend === 'native') {
      return new Promise(resolve => {
        pendingRewarded = (rewarded) => resolve({ rewarded });
        try { window.YandexAds.showRewarded(UNIT_REWARDED); }
        catch (e) { console.warn('[Ads] native rewarded failed', e); pendingRewarded = null; resolve({ rewarded: false }); }
      });
    }
    if (backend === 'yagames' && ysdk) {
      return new Promise(resolve => {
        let gotReward = false;
        ysdk.adv.showRewardedVideo({
          callbacks: {
            onRewarded: () => { gotReward = true; },
            onClose: () => resolve({ rewarded: gotReward }),
            onError: () => resolve({ rewarded: false }),
          },
        });
      });
    }
    // mock — всегда даём reward
    return new Promise(resolve => {
      console.log('[Ads] showRewarded mock — granting reward');
      setTimeout(() => resolve({ rewarded: true }), 800);
    });
  }

  function getBackend() { return backend; }

  return { init, showInterstitial, preloadInterstitial, showRewarded, getBackend, UNIT_INTERSTITIAL, UNIT_REWARDED };
})();

/* ============================================================
   [RENDER] — отрисовка колбочек, HUD, модалок.
   ============================================================ */
window.Render = (() => {
  const $sticks = document.getElementById('sticks');
  const $hudLevel = document.getElementById('hud-level');
  const $hudMoves = document.getElementById('hud-moves');
  const $hudDiff  = document.getElementById('hud-diff');
  const $winModal = document.getElementById('win-modal');
  const $winText  = document.getElementById('win-text');
  const $toast    = document.getElementById('toast');
  const $undo     = document.getElementById('btn-undo');

  // Сложность теперь — параметр УРОВНЯ, определяется в момент генерации:
  //   - 4 ступени равномерно по оптимальному числу ходов BFS-решения;
  //   - «Очень сложно» — только для уровней, сгенерированных с
  //     требованием бонуса (Решаемо только при +1 колбе).
  // Если решатель не уложился в timeout (level.optimalSteps === null),
  // fallback'имся в «Сложно». Пороги ниже подобраны эмпирически на
  // 10 default-уровнях + endless tier.
  const DIFF_TIERS = [
    { maxSteps:  8,       name:'Очень просто',  color:'#7be37b' },
    { maxSteps: 16,       name:'Просто',        color:'#c5e35b' },
    { maxSteps: 26,       name:'Средне',        color:'#ffd23f' },
    { maxSteps: Infinity, name:'Сложно',        color:'#ff8a2b' },
  ];
  const DIFF_REQUIRES_BONUS = { name:'Очень сложно', color:'#ef3a5d' };
  function getDifficulty(optimalSteps, requireBonus) {
    if (requireBonus) return DIFF_REQUIRES_BONUS;
    if (optimalSteps == null) return DIFF_TIERS[DIFF_TIERS.length - 1]; // fallback: «Сложно»
    return DIFF_TIERS.find(t => optimalSteps <= t.maxSteps);
  }

  /**
   * Ключ визуального состояния колбы. Используется в renderAll для
   * reconciliation: если у существующего DOM-элемента dataset.key совпадает
   * с желаемым, мы НЕ пересобираем его — это нужно чтобы:
   *   – галочка-бейдж не «моргала» (checkPop animation не перезапускалась)
   *     на собранных колбах при любом клике;
   *   – пульсация «+» (SVG <animate>) на бонусной колбе шла непрерывно,
   *     а не рестартилась с каждым ре-рендером;
   *   – fill-анимация слоёв не дёргалась после хода.
   * В ключ НЕ включаем lastAdded.count: первый buildBottle добавит .is-new,
   * последующий renderAll увидит совпадение ключей и оставит DOM как есть
   * (анимация уже отыграла за счёт fill-mode:both).
   */
  function bottleKey(stack, idx, completed, selected) {
    return `b${idx}|${stack.join(',')}|c${completed?1:0}|s${selected?1:0}`;
  }

  function renderAll() {
    const s = State.get();
    if (!s) return;
    const showAdd = !s.bonusUsedThisLevel && s.sticks.length < 13;
    const totalCount = s.sticks.length + (showAdd ? 1 : 0);
    $sticks.dataset.count = String(totalCount);

    // Желаемый порядок: сначала все колбы, потом (если есть) bonus-add.
    const desired = s.sticks.map((stack, idx) => {
      const completed = State.isCompletedStack(stack, s.capacity);
      const isSelected = s.selected === idx;
      return {
        kind: 'bottle', idx, stack, completed, isSelected,
        key: bottleKey(stack, idx, completed, isSelected),
      };
    });
    if (showAdd) desired.push({ kind: 'add', key: 'add' });

    // Reconcile: проходим по существующим детям и сверяем ключи.
    // Совпал — не трогаем. Не совпал — заменяем. Если детей меньше — добавляем.
    const existing = Array.from($sticks.children);
    for (let i = 0; i < desired.length; i++) {
      const want = desired[i];
      const have = existing[i];
      if (have && have.dataset.key === want.key) continue;
      const el = want.kind === 'add'
        ? buildAddBottle(s.capacity)
        : buildBottle(want.stack, want.idx, s.capacity);
      if (have) have.replaceWith(el);
      else $sticks.appendChild(el);
    }
    // Удаляем лишних детей (например, исчезла bonus-add колба).
    for (let i = existing.length - 1; i >= desired.length; i--) {
      existing[i].remove();
    }

    // Метку «новые слои» сбрасываем после рендера — иначе следующий renderAll
    // без хода пере-играл бы анимацию заполнения (это пути с keyMismatch).
    if (s.lastAdded) s.lastAdded = null;
    renderHud();
    renderActionButtons();
    fitBottles();
  }

  /**
   * Подгоняет ширину колб (--bottle-max) так, чтобы все колбы влезали и по
   * ширине поля, и по доступной высоте. CSS-grid задаёт колонки по
   * data-count, мы лишь зажимаем max-width у `.bottle`.
   *
   * Для 12 колб (4×3 grid) на телефонном экране даже 78px на колбу не лезет
   * по высоте: 3 ряда × ~258px = ~774px > доступного field. Этот код
   * ужимает колбы пропорционально, держа aspect-ratio.
   */
  // Та же таблица колонок, что в CSS (.sticks[data-count="N"]). 1 ряд по
  // умолчанию N столбцов; чтобы рисунок не растягивался, для 6+ переходим
  // на 2 ряда (3-4-5 столбцов).
  const GRID_COLS = {3:3,4:4,5:5,6:3,7:4,8:4,9:5,10:5,11:4,12:4,13:5};
  const BOTTLE_ASPECT_W_OVER_H = 1051 / 3484.75; // ≈ 0.3016

  function fitBottles() {
    const field = document.querySelector('.field');
    if (!field || !$sticks) return;
    const dataCount = parseInt($sticks.dataset.count || '0', 10);
    if (!dataCount) return;
    const cols = GRID_COLS[dataCount] || Math.min(dataCount, 5);
    const rows = Math.ceil(dataCount / cols);

    const fieldRect = field.getBoundingClientRect();
    if (!fieldRect.width || !fieldRect.height) return;

    const sticksStyle = getComputedStyle($sticks);
    // row-gap и column-gap считаем раздельно — 2-рядные раскладки имеют
    // увеличенный row-gap (см. CSS .sticks[data-count="6"…"10"]).
    const rowGap = parseFloat(sticksStyle.rowGap) || 12;
    const colGap = parseFloat(sticksStyle.columnGap) || rowGap;
    // .sticks: max-width 560, padding 8px (box-sizing:border-box).
    // .field:  padding 8px.
    const contentW = Math.min(fieldRect.width - 16, 560 - 16);
    const contentH = fieldRect.height - 16;

    const maxByWidth  = (contentW - (cols - 1) * colGap) / cols;
    const maxByHeight = ((contentH - (rows - 1) * rowGap) / rows) * BOTTLE_ASPECT_W_OVER_H;

    // Базовый кап — 52px (=78/1.5), по требованию пользователя уменьшить колбы
    // на всех экранах в 1.5×. Минимум — 32px, ниже становится нечитаемо.
    const bottleMax = Math.max(32, Math.floor(Math.min(52, maxByWidth, maxByHeight)));
    document.documentElement.style.setProperty('--bottle-max', bottleMax + 'px');
  }
  // Реагируем на ресайз окна (поворот экрана, devtools и т.п.).
  window.addEventListener('resize', () => fitBottles());

  // === Inline-SVG модель колбы (исходник пользователя из Figma) ===
  // viewBox 999×4378. Внутри:
  //   – mask (форма cavity для слоёв жидкости)
  //   – серая обводка (outer path, even-odd с inner cavity)
  //   – полупрозрачный белый блик слева
  //   – наклонная «таблетка» блика на горлышке
  // Слои жидкости: <rect> в области y∈[LIQ_TOP..LIQ_BOTTOM] с x/width
  // достаточно широкими, чтобы боковые края подрезались mask.
  const SVG_NS = 'http://www.w3.org/2000/svg';
  // Обновлённый Figma-SVG, корпус сжат на 25%: y ≥ 679 → 679 + (y-679)*0.75.
  // ViewBox по высоте 4420 → 3484.75. Горлышко и плечики (y < 679) не тронуты.
  const SVG_VIEW = '0 0 1051 3484.75';
  const MASK_PATH = 'M858.68 45C913.641 45.0003 953.042 98.0094 937.198 150.638L849.273 442.703C921.875 496.031 969 582.012 969 679V3095.125C969 3281.3125 767.752 3432.25 519.5 3432.25C271.248 3432.25 70 3281.3125 70 3095.125V679C70 584.041 115.174 499.632 185.203 446.092C184.84 445.007 184.498 443.911 184.178 442.805L99.3447 149.805C84.1602 97.3593 123.51 45 178.109 45H858.68Z';
  const OUTLINE_PATH = 'M913.334 0C982.885 0 1033.59 65.8517 1015.81 133.093L937.917 427.731C1002.02 488.591 1042 574.627 1042 670V3109.75C1042 3316.855 818.142 3484.75 542 3484.75H466C208.635 3484.75 9.08903e-06 3328.27 0 3135.25V670C1.49627e-05 576.102 38.7481 491.254 101.126 430.573L24.1943 132.489C6.87802 65.3946 57.5379 0 126.831 0H913.334ZM144.621 45C90.2324 45 50.9137 96.9829 65.7168 149.318L143.783 425.318C144.201 426.796 144.659 428.255 145.153 429.693C78.8031 488.501 36.9834 574.367 36.9834 670V3114.25C36.9834 3304.7875 242.932 3459.25 496.983 3459.25H520.983C788.289 3459.25 1004.98 3296.7325 1004.98 3096.25V670C1004.98 573.19 962.127 486.39 894.352 427.536C894.53 426.967 894.704 426.395 894.87 425.82L974.839 149.82C990.036 97.3714 950.684 45 896.078 45H144.621Z';
  const HIGHLIGHT_PATH = 'M333.638 45C279.249 45 239.93 96.9829 254.733 149.318L332.8 425.318C333.218 426.796 333.675 428.255 334.17 429.693C267.82 488.501 226 574.367 226 670V3096.25C226 3252.27 393.43 3408.78 615.491 3441.585C584.926 3447.115 553.325 3459.25 520.983 3459.25C253.678 3459.25 36.9834 3296.7325 36.9834 3096.25V670C36.9834 574.367 78.8031 488.501 145.153 429.693C144.659 428.255 144.201 426.796 143.783 425.318L65.7168 149.318C50.9137 96.9829 90.2324 45 144.621 45H333.638Z';
  // Область жидкости в новом SVG: rect'ы Figma шли от y=619 до y=4350.
  // После сжатия LIQ_BOTTOM = 3432.25. LIQ_TOP=619 (внутри плечиков).
  const LIQ_TOP = 619;
  const LIQ_BOTTOM = 3432.25;
  const LIQ_RANGE = LIQ_BOTTOM - LIQ_TOP;
  // Перекрытие слоёв — устранят тонкие фоновые полоски между ними.
  const LAYER_OVERLAP = 24;

  function buildBottle(stack, idx, capacity) {
    const s = State.get();
    const el = document.createElement('div');
    el.className = 'bottle';
    el.dataset.idx = String(idx);
    const isSelected = s.selected === idx;
    if (isSelected) el.classList.add('selected');
    const completed = State.isCompletedStack(stack, capacity);
    if (completed) el.classList.add('completed');
    // dataset.key — отпечаток визуального состояния. renderAll использует
    // его для reconcile, чтобы НЕ пересобирать колбы без изменений.
    el.dataset.key = bottleKey(stack, idx, completed, isSelected);

    const layerH = LIQ_RANGE / capacity;
    const lastAdded = s.lastAdded;
    const newCount = (lastAdded && lastAdded.idx === idx) ? lastAdded.count : 0;
    // Длительность одного fill-кадра в секундах — синхронизируем с CSS
    // (.bottle svg rect.layer.is-new { animation: layerFill .32s }).
    // Слои в зоне «новых» получают inline animation-delay так, чтобы
    // нижний слой заполнялся первым, потом следующий и т.д. — без
    // визуальных разрывов между ними.
    const LAYER_FILL_S = 0.32;

    // Слои: stack[0]=низ, stack[N-1]=верх. В SVG y растёт вниз,
    // поэтому stack[i] кладём на y = LIQ_BOTTOM - (i+1)*layerH.
    // Каждый rect расширен на LAYER_OVERLAP вверх и вниз — соседние
    // слои перекрываются, чтобы не было сквозной полоски фона.
    const layerRects = stack.map((color, i) => {
      const baseY = LIQ_BOTTOM - (i + 1) * layerH;
      const y = baseY - LAYER_OVERLAP;
      const h = layerH + LAYER_OVERLAP * 2;
      const isNew = i >= stack.length - newCount;
      // Порядок среди новых: 0 = самый нижний (наполняется первым), далее вверх.
      const orderFromBottom = isNew ? (i - (stack.length - newCount)) : 0;
      const delayS = isNew ? orderFromBottom * LAYER_FILL_S : 0;
      const hex = Levels.COLOR_HEX[color] || '#888';
      const delayAttr = isNew && orderFromBottom > 0
        ? ` style="animation-delay:${delayS.toFixed(3)}s"`
        : '';
      return `<rect class="layer${isNew ? ' is-new' : ''}" x="-1214" y="${y.toFixed(2)}" width="3428" height="${h.toFixed(2)}" fill="${hex}"${delayAttr}/>`;
    }).join('');

    // Галочка-бейдж на собранной колбе. Рисуем поверх SVG, чтобы он не
    // обрезался маской и не зависел от layout слоёв жидкости.
    const checkBadge = completed
      ? `<div class="check-badge"><svg viewBox="0 0 24 24" xmlns="${SVG_NS}"><path d="M5 12.5 L10 17 L19 7.5" fill="none" stroke="white" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`
      : '';

    el.innerHTML = `
      <svg viewBox="${SVG_VIEW}" preserveAspectRatio="xMidYMid meet" xmlns="${SVG_NS}">
        <defs>
          <mask id="bottleMask${idx}" maskUnits="userSpaceOnUse">
            <path d="${MASK_PATH}" fill="white"/>
          </mask>
        </defs>
        <g mask="url(#bottleMask${idx})">
          ${layerRects}
        </g>
        <!-- Обводка (currentColor; .selected меняет на жёлтый) -->
        <path d="${OUTLINE_PATH}" fill="currentColor" fill-rule="evenodd"/>
        <!-- Левый внутренний блик -->
        <path d="${HIGHLIGHT_PATH}" fill="white" fill-opacity="0.17"/>
        <!-- Наклонная «таблетка» блика на горлышке -->
        <rect x="102" y="101.098" width="77.0141" height="333.084" rx="38.5071" transform="rotate(-15.1276 102 101.098)" fill="white"/>
      </svg>
      ${checkBadge}
    `;
    return el;
  }

  // Полупрозрачная «+» колба — тот же силуэт, без жидкости, со знаком «+»
  // нарисованным внутри SVG (чтобы не торчал за границы маски).
  function buildAddBottle(capacity) {
    const el = document.createElement('div');
    el.className = 'bottle bottle-add';
    el.dataset.role = 'add';
    // Стабильный key — renderAll reconcile никогда не пересоберёт bonus-колбу
    // повторно (пока она вообще остаётся в desired), чтобы SVG <animate>
    // пульсации «+» шла непрерывно и не «моргала» на каждом клике.
    el.dataset.key = 'add';
    el.title = '+ Колба за рекламу';
    el.innerHTML = `
      <svg viewBox="${SVG_VIEW}" preserveAspectRatio="xMidYMid meet" xmlns="${SVG_NS}">
        <defs>
          <linearGradient id="plusBg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffd23f"/>
            <stop offset="1" stop-color="#ff8a2b"/>
          </linearGradient>
        </defs>
        <path d="${OUTLINE_PATH}" fill="currentColor" fill-rule="evenodd"/>
        <g transform="translate(525.5 1742)">
          <circle r="260" fill="url(#plusBg)">
            <animate attributeName="r" values="260;300;260" dur="1.6s" repeatCount="indefinite"/>
          </circle>
          <path d="M -120 0 H 120 M 0 -120 V 120" stroke="#3b1300" stroke-width="64" stroke-linecap="round"/>
        </g>
      </svg>
    `;
    return el;
  }

  function renderHud() {
    const s = State.get();
    if (!s) return;
    $hudLevel.textContent = s.level;
    if ($hudMoves) $hudMoves.textContent = s.moves;
    if ($hudDiff) {
      // Сложность — из мета уровня (App.loadLevel запихивает на state в момент
      // генерации). Если по каким-то причинам ещё не выставлена — fallback в
      // getDifficulty вернёт «Сложно».
      const d = getDifficulty(s.optimalSteps, s.requireBonus);
      $hudDiff.textContent = d.name;
      $hudDiff.style.setProperty('--diff-color', d.color);
    }
  }

  function renderActionButtons() {
    const s = State.get();
    if (!s) return;
    $undo.disabled = s.history.length === 0;
  }

  /**
   * Многошаговая анимация переливания.
   *   1. источник подлетает к приёмнику (translate; ~280ms)
   *   2. наклоняется горлышком к приёмнику (rotate ~32°; ~200ms)
   *   3. появляется цветная струйка между горлышками (~400ms)
   *      параллельно приёмник подскакивает (.receiving-bump)
   *   4. источник возвращается на исходную позицию (~300ms)
   * Возвращает Promise, который резолвится по окончании (≈1.1s).
   * Новые layer'ы в приёмнике анимируются отдельно через CSS .is-new
   * (заполнение сверху-вниз), запускается renderAll'ом.
   */
  /**
   * Анимация переливания в стиле Get Color:
   *   1. Источник поднимается ВЫСОКО над приёмником (translate-y чуть выше его горлышка)
   *      и пристыковывается горлышком над neck'ом приёмника.
   *   2. Наклоняется горлышком к приёмнику (~38° clockwise если dst справа,
   *      counter-clockwise если слева). transform-origin = нижняя точка горлышка
   *      колбы-источника, чтобы горлышко выглядело как «висит на оси».
   *   3. Тонкая вертикальная струйка течёт ровно в горлышко приёмника.
   *   4. Приёмник bumps, в нём появляется новый слой (.is-new).
   *   5. Источник возвращается на исходную позицию.
   */
  /**
   * Источник подлетает ГОРЛЫШКОМ к горлышку приёмника и наклоняется
   * относительно своего горлышка (pivot = верхняя точка колбы).
   *
   * Шаги (≈1.13s total):
   *   A. translate + rotate ОДНОВРЕМЕННО от 0% к 100% (≈400ms).
   *      Колба с первого кадра идёт по дуге: одновременно едет и
   *      кренится. К концу фазы — в полной позе у приёмника,
   *      наклонена на 70°. Силуэты не сливаются в один — пока src
   *      доезжает, его тело уже отклоняется в сторону.
   *   B. появляется струйка между горлышками + bump приёмника,
   *      позу держим (≈360ms). По окончании стрима пересобираем
   *      src/dst в post-move.
   *   C. translate + un-rotate ОДНОВРЕМЕННО от 100% к 0% (≈400ms).
   *      Зеркальный возврат: колба выпрямляется и отъезжает за один
   *      слитный жест.
   *
   * Дополнительный вертикальный зазор (verticalClearance) приподнимает
   * горлышко источника так, чтобы во время наклона его дно не касалось
   * корпуса приёмника. Зависит от высоты колбы (пропорционально).
   */
  function animatePour(srcIdx, dstIdx, color) {
    return new Promise(resolve => {
      let src = $sticks.children[srcIdx];
      let dst = $sticks.children[dstIdx];
      if (!src || !dst) { resolve(); return; }

      const srcRect = src.getBoundingClientRect();
      const dstRect = dst.getBoundingClientRect();
      const srcNeckX = srcRect.left + srcRect.width / 2;
      const srcNeckY = srcRect.top + srcRect.height * 0.04;
      const dstNeckX = dstRect.left + dstRect.width / 2;
      const dstNeckY = dstRect.top + dstRect.height * 0.04;

      // Вертикальный зазор между горлышками: чем выше колба, тем больше
      // зазор. Это нужно чтобы при наклоне в 70° тело источника проходило
      // выше тела приёмника, не задевая его. Минимум 44px на маленьких колбах.
      const verticalClearance = Math.max(44, Math.round(srcRect.height * 0.28));

      const flyDx = dstNeckX - srcNeckX;
      const flyDy = (dstNeckY - srcNeckY) - verticalClearance;
      const tiltDir = (dstNeckX >= srcNeckX) ? 70 : -70;

      // Сколько слоёв переливаем — стрим и хвост анимации зависят от этого.
      const st0 = State.get();
      const layerCount = (st0 && st0.lastAdded && st0.lastAdded.idx === dstIdx)
        ? Math.max(1, st0.lastAdded.count) : 1;
      const LAYER_FILL_MS = 320;   // sync с CSS .layer.is-new { animation: layerFill .32s }
      // Стрим живёт ровно столько, сколько идёт последовательное заполнение
      // всех новых слоёв в приёмнике (плюс пара кадров на хвост). Минимум
      // 360ms — на одиночный слой.
