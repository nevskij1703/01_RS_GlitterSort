      const streamMs = Math.max(360, layerCount * LAYER_FILL_MS + 60);

      const FORWARD_MS = 400; // подлёт + наклон в один жест
      const RETURN_MS  = 400; // зеркальный возврат

      src.classList.add('pouring');
      src.style.transformOrigin = '50% 4%';

      // Фаза A: translate + rotate ОДНОВРЕМЕННО с самого старта.
      src.style.transition = `transform ${FORWARD_MS}ms cubic-bezier(.3,0,.3,1)`;
      src.style.transform  = `translate(${flyDx}px, ${flyDy}px) rotate(${tiltDir}deg)`;

      setTimeout(() => {
        // Фаза B: стрим + bump.
        // Сразу пересобираем DST в post-move state — новые слои с .is-new
        // начнут заполняться последовательно (через inline animation-delay,
        // см. buildBottle). Это важно: для мульти-перелива надо чтобы каждый
        // слой успел дорасти до следующего БЕЗ разрывов в анимации.
        // SRC оставляем pre-move до конца стрима — он визуально «отдаёт»
        // жидкость, а не теряет слои мгновенно.
        const s = State.get();
        const newDst = buildBottle(s.sticks[dstIdx], dstIdx, s.capacity);
        newDst.classList.add('receiving-bump');
        dst.replaceWith(newDst);
        dst = newDst;
        // Запоминаем lastAdded'ом был ли это тот же dst — он скоро понадобится
        // при rebuild'е src (там lastAdded должен быть очищен, чтобы newSrc
        // не пытался применить .is-new). Делаем clear ниже, после src rebuild.

        const stream = document.createElement('div');
        stream.className = 'pour-stream';
        stream.style.setProperty('--stream-color', `var(--c-${color}, var(--accent))`);
        // Удлиняем стрим под общую длительность фазы B.
        stream.style.animationDuration = `${streamMs}ms`;
        const liveDst = dst.getBoundingClientRect();
        const xStream = liveDst.left + liveDst.width / 2 - 3;
        const yTop = liveDst.top - Math.max(20, verticalClearance - 6);
        const yBot = liveDst.top + liveDst.height * 0.16;
        stream.style.left   = xStream + 'px';
        stream.style.top    = yTop + 'px';
        stream.style.height = (yBot - yTop) + 'px';
        stream.style.width  = '6px';
        document.body.appendChild(stream);

        // Конец стрима → SRC rebuild (теряет верхние перелитые слои) →
        // фаза C (возврат).
        setTimeout(() => {
          const keepTransform   = src.style.transform;
          const keepTransition  = src.style.transition;
          const keepOrigin      = src.style.transformOrigin;
          const newSrc = buildBottle(s.sticks[srcIdx], srcIdx, s.capacity);
          newSrc.classList.add('pouring');
          newSrc.style.transform       = keepTransform;
          newSrc.style.transition      = keepTransition;
          newSrc.style.transformOrigin = keepOrigin;
          src.replaceWith(newSrc);
          src = newSrc;

          if (s.lastAdded) s.lastAdded = null;
          stream.remove();

          // Фаза C: возврат translate + un-rotate ОДНОВРЕМЕННО.
          src.style.transition = `transform ${RETURN_MS}ms cubic-bezier(.4,0,.25,1)`;
          src.style.transform  = '';
          setTimeout(() => {
            src.classList.remove('pouring');
            dst.classList.remove('receiving-bump');
            src.style.transition = '';
            src.style.transformOrigin = '';
            resolve();
          }, RETURN_MS);
        }, streamMs);
      }, FORWARD_MS);
    });
  }

  function showWin(text) {
    if (text) $winText.textContent = text;
    $winModal.classList.add('open');
  }
  function hideWin() { $winModal.classList.remove('open'); }

  // ===== Rate-us модалка =====
  const $rateUsModal = document.getElementById('rateus-modal');
  function showRateUs() { $rateUsModal.classList.add('open'); }
  function hideRateUs() { $rateUsModal.classList.remove('open'); }

  let toastTimer = null;
  function toast(msg, ms = 1500) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $toast.classList.remove('show'), ms);
  }

  return { renderAll, renderHud, renderActionButtons, showWin, hideWin, toast,
           animatePour, getDifficulty, showRateUs, hideRateUs };
})();

/* ============================================================
   [DEVPANEL] — редактор уровня + симуляция (BFS).
   Перенесён из RC_Colbs_v2/game/cheats/tabLevelEditor.js.
   Toggle: ⚙ в шапке или Ctrl+Shift+D.
   Flow:
     1. Юзер выбирает цвет для каждого из 11 типов пончиков (cycle palette).
        Смена цвета НЕ перегенерирует — мапит цвета к кэшу abstractBottles.
     2. Юзер правит параметры (sticks/capacity/empty/diff/reward/timeout).
        Правки не применяются автоматически — поле ждёт «Сгенерировать».
     3. Generate (random-tuned) с абстрактными цветами palette[0..N-1],
        результат кэшируется как working.abstractBottles, затем мапится
        в пользовательские цвета.
   Симуляция (Анализ + Автопроход) — наша секция, не было в оригинале.
   ============================================================ */
window.DevPanel = (() => {
  const $panel = document.getElementById('dev-panel');
  const $body  = document.getElementById('dev-body');
  const $close = document.getElementById('dev-close');
  let isOpen = false;
  let working = null;
  let editingLevel = 1;
  let requireBonus = false;

  function open() {
    isOpen = true;
    render();
    $panel.classList.add('open');
  }
  function close() { isOpen = false; $panel.classList.remove('open'); }
  function toggle() { isOpen ? close() : open(); }

  $close.addEventListener('click', close);
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && (e.key === 'D' || e.key === 'd' || e.code === 'KeyD')) {
      e.preventDefault();
      toggle();
    }
  });

  function $(sel) { return $body.querySelector(sel); }
  function clamp(v, lo, hi) {
    if (!Number.isFinite(v)) return lo;
    return Math.max(lo, Math.min(hi, v | 0));
  }
  function formatSec(ms) {
    if (ms < 1000) return `${ms.toFixed(0)}ms`;
    return `${(ms / 1000).toFixed(2)}s`;
  }

  const HTML = `
    <h3>Уровень для редактирования</h3>
    <div class="dev-row" id="le-lvl-row" style="flex-wrap:wrap">
      <label style="flex:0 0 auto;">Уровень</label>
      <span id="le-lvl-buttons" style="display:contents;"></span>
      <input type="number" id="le-lvl-n" min="1" step="1" placeholder="N" style="width:60px;flex:0 0 60px;">
      <button id="le-lvl-go" class="ghost">Go</button>
    </div>
    <div class="actions" style="margin-top:2px;">
      <button id="le-lvl-add" class="ghost">+ Добавить</button>
      <button id="le-lvl-del" class="danger">− Удалить</button>
    </div>

    <h3>Цвета жидкости (тип пончиков)</h3>
    <p style="margin:4px 0 6px;color:var(--text-dim);font-size:11px;">
      Клик по чипу — следующий цвет из палитры. Типы за пределами
      <i>sticks − emptyStick</i> остаются настраиваемыми, но визуально неактивны.
    </p>
    <div class="dev-row" id="le-types-row" style="gap:6px;flex-wrap:wrap"></div>

    <h3>Параметры (применятся при генерации)</h3>
    <div class="dev-row"><label>Столбики</label><input type="number" id="le-sticks" min="2" max="12" step="1"></div>
    <div class="dev-row"><label>Объём</label><input type="number" id="le-cap" min="2" max="6" step="1"></div>
    <div class="dev-row"><label>Пустых столбиков</label><input type="number" id="le-empty" min="0" step="1"></div>
    <div class="dev-row"><label>Кол-во ходов</label><input type="number" id="le-diff" min="1" max="1000" step="1"></div>
    <div class="dev-row">
      <label>Тайм-аут</label>
      <input type="number" id="le-gen-tuneout" min="0.1" max="600" step="0.5" style="flex:0 0 80px;"> <span style="color:var(--text-dim)">сек</span>
    </div>
    <label class="checkbox" style="margin:6px 0 2px;">
      <input type="checkbox" id="le-require-bonus">
      Решаемо только при +1 колбе
    </label>
    <p style="margin:0 0 4px;color:var(--text-dim);font-size:11px;">
      Принимаются только раскладки, нерешаемые с текущим числом пустых
      колб, но решаемые если игрок активирует «+1 колба за рекламу».
      Если за тайм-аут таких раскладок не нашлось — выводится сообщение об ошибке.
    </p>

    <div class="actions" style="margin-top:10px;">
      <button id="le-generate" class="primary" style="flex:1;font-weight:600;padding:10px;">🎲 Сгенерировать</button>
    </div>
    <p id="le-gen-status" style="color:var(--text-dim);font-size:11px;margin:4px 0;min-height:14px;"></p>
    <p id="le-gen-pending" style="color:#ffae54;font-size:11px;margin:4px 0;min-height:14px;"></p>

    <h3>JSON (правки всех уровней)</h3>
    <p style="margin:4px 0 6px;color:var(--text-dim);font-size:11px;">
      Один документ со всеми накопленными правками уровней.
    </p>
    <div class="actions">
      <button id="le-copy">Copy JSON</button>
      <button id="le-clear" class="ghost">Сбросить runtime</button>
    </div>
    <span id="le-stats" style="color:var(--text-dim);font-size:11px;display:block;margin-top:4px"></span>
    <pre id="le-json"></pre>

    <h3>Сброс</h3>
    <div class="actions">
      <button id="le-reset" class="danger">Reset L?</button>
      <button id="le-reset-all" class="danger">Reset всё</button>
    </div>
    <p style="margin:4px 0 8px;color:var(--text-dim);font-size:11px;">
      <b>Reset L?</b> — сброс runtime-правок текущего уровня.<br>
      <b>Reset всё</b> — полный сброс localStorage (как при первом открытии).
    </p>

    <h3>🧠 Симуляция (BFS)</h3>
    <div class="actions">
      <button id="dv-analyze">🔍 Анализ</button>
      <button id="dv-autoplay" class="primary">▶ Автопроход</button>
      <button id="dv-stop">⏹ Стоп</button>
    </div>
    <div class="dev-row">
      <label>Тайм-аут BFS (мс)</label>
      <input type="number" id="dv-bfs-timeout" min="100" max="30000" step="500" value="3000">
      <label style="flex:0 0 auto">Шаг (мс)</label>
      <input type="number" id="dv-autoplay-delay" min="100" max="3000" step="50" value="450" style="flex:0 0 80px">
    </div>
    <div class="status" id="dv-sim-status">Нажми «Анализ» для оптимального пути.</div>
  `;

  function render() {
    $body.innerHTML = HTML;
    wire();
    refreshLevelButtons();
    loadIntoUI(State.get()?.level || 1);
  }

  function refreshLevelButtons() {
    const wrap = $('#le-lvl-buttons');
    if (!wrap) return;
    const count = Levels.getLevelCount();
    wrap.innerHTML = '';
    for (let n = 1; n <= count; n++) {
      const b = document.createElement('button');
      b.dataset.lvl = String(n);
      b.className = 'le-lvl-btn';
      b.textContent = `L${n}`;
      b.addEventListener('click', () => switchLevel(+b.dataset.lvl));
      wrap.appendChild(b);
    }
    refreshActiveLevelButton();
  }

  function refreshActiveLevelButton() {
    $body.querySelectorAll('.le-lvl-btn').forEach(b => {
      b.classList.toggle('active', +b.dataset.lvl === editingLevel);
    });
    const reset = $('#le-reset');
    if (reset) reset.textContent = `Reset L${editingLevel}`;
  }

  function wire() {
    $('#le-lvl-go').addEventListener('click', () => {
      const n = +$('#le-lvl-n').value | 0;
      if (n >= 1) switchLevel(n);
    });
    $('#le-lvl-add').addEventListener('click', () => {
      Levels.insertLevelAfter(editingLevel);
      Render.toast(`Добавлен уровень L${editingLevel + 1}`);
      refreshLevelButtons();
      switchLevel(editingLevel + 1);
    });
    $('#le-lvl-del').addEventListener('click', () => {
      const removed = editingLevel;
      const ok = Levels.removeLevel(removed);
      if (!ok) { Render.toast('Нельзя удалить последний уровень'); return; }
      Render.toast(`Удалён L${removed}`);
      const newCount = Levels.getLevelCount();
      const target = Math.max(1, Math.min(newCount, removed));
      refreshLevelButtons();
      switchLevel(target);
    });

    ['#le-sticks', '#le-cap', '#le-empty', '#le-diff'].forEach(sel => {
      $(sel).addEventListener('change', () => { readScalarsIntoWorking(); markPending(); });
    });
    $('#le-gen-tuneout').addEventListener('change', () => {
      const sec = Math.max(0.1, Math.min(600, +$('#le-gen-tuneout').value || 5));
      $('#le-gen-tuneout').value = sec;
      working.tuningTimeoutMs = Math.round(sec * 1000);
    });
    $('#le-require-bonus').addEventListener('change', (e) => { requireBonus = !!e.target.checked; });

    $('#le-generate').addEventListener('click', generateNow);
    $('#le-copy').addEventListener('click', copyJson);
    $('#le-clear').addEventListener('click', clearAllRuntime);
    $('#le-reset').addEventListener('click', resetCurrentLevel);
    $('#le-reset-all').addEventListener('click', resetAll);

    $('#dv-analyze').addEventListener('click', onAnalyze);
    $('#dv-autoplay').addEventListener('click', onAutoplay);
    $('#dv-stop').addEventListener('click', onStop);
  }

  // --- Level switching ---
  function switchLevel(n) {
    if (!Number.isFinite(n) || n < 1) return;
    App.loadLevel(n);
    loadIntoUI(n);
  }

  function loadIntoUI(level) {
    editingLevel = level;
    refreshActiveLevelButton();

    const params = Levels.getParams(level);
    const filled = (params.sticks ?? 1) - (params.emptyStick ?? 0);

    // 11-slot colour array: per-level → palette padding для лишних чипов.
    const baseColours = Array.isArray(params.colours) ? [...params.colours] : [];
    for (let i = baseColours.length; i < 11; i++) {
      baseColours.push(Levels.PALETTE[i % Levels.PALETTE.length]);
    }

    // Reverse-mapping текущих колб в abstract palette[0..filled-1]: позволяет
    // менять цвета чипами без перегенерации.
    let abstractBottles = null;
    const s = State.get();
    if (s && s.level === level && Array.isArray(s.sticks)) {
      const inverseMap = {};
      for (let i = 0; i < filled; i++) inverseMap[baseColours[i]] = Levels.PALETTE[i];
      abstractBottles = s.sticks.map(stack =>
        stack.map(c => inverseMap[c] !== undefined ? inverseMap[c] : c));
    }

    working = {
      sticks:     params.sticks,
      capacity:   params.capacity,
      emptyStick: params.emptyStick ?? 1,
      difficulty: params.difficulty ?? 50,
      colours:    baseColours,
      tuningTimeoutMs: params.tuningTimeoutMs ?? 5000,
      abstractBottles,
    };
    $('#le-sticks').value = working.sticks;
    $('#le-cap').value    = working.capacity;
    $('#le-empty').value  = working.emptyStick;
    $('#le-diff').value   = working.difficulty;
    $('#le-gen-tuneout').value = (working.tuningTimeoutMs / 1000).toString();
    $('#le-require-bonus').checked = requireBonus;

    renderTypesRow();
    clearPending();

    const savedMeta = Persist.loadGenMeta(level);
    if (savedMeta) showTuningMeta(savedMeta);
    else $('#le-gen-status').textContent = '';

    renderJson();
    setSimStatus('Нажми «Анализ» для оптимального пути.');
  }

  function readScalarsIntoWorking() {
    const sticks   = clamp(+$('#le-sticks').value || 0, 2, 12);
    const capacity = clamp(+$('#le-cap').value || 0, 2, 6);
    const empty    = clamp(+$('#le-empty').value || 0, 0, sticks - 1);
    const diff     = clamp(+$('#le-diff').value || 0, 1, 1000);
    working.sticks = sticks;
    working.capacity = capacity;
    working.emptyStick = empty;
    working.difficulty = diff;
    $('#le-sticks').value = sticks;
    $('#le-cap').value    = capacity;
    $('#le-empty').value  = empty;
    $('#le-diff').value   = diff;
  }

  function markPending() {
    const note = $('#le-gen-pending');
    if (note) note.textContent = '⚠ Параметры изменены — нажмите Сгенерировать чтобы применить';
  }
  function clearPending() {
    const note = $('#le-gen-pending');
    if (note) note.textContent = '';
  }

  // 11 цветовых чипов, кликом — следующий цвет палитры.
  function renderTypesRow() {
    const wrap = $('#le-types-row');
    wrap.innerHTML = '';
    const filled = working.sticks - working.emptyStick;
    for (let i = 0; i < 11; i++) {
      const colour = working.colours[i] || Levels.PALETTE[i % Levels.PALETTE.length];
      const inUse = i < filled;
      const cell = document.createElement('div');
      cell.style.cssText = `display:flex;flex-direction:column;align-items:center;gap:2px;opacity:${inUse ? 1 : 0.4};`;
      const label = document.createElement('span');
      label.textContent = (i + 1).toString();
      label.style.cssText = 'color:var(--text-dim);font-size:10px;';
      const chip = document.createElement('button');
      chip.className = 'le-type-chip';
      chip.dataset.idx = String(i);
      chip.title = 'Клик — следующий цвет';
      chip.style.background = Levels.COLOR_HEX[colour] || '#888';
      chip.addEventListener('click', () => {
        const idx = +chip.dataset.idx;
        const cur = working.colours[idx];
        const palIdx = Levels.PALETTE.indexOf(cur);
        const next = Levels.PALETTE[(palIdx + 1) % Levels.PALETTE.length];
        working.colours[idx] = next;
        chip.style.background = Levels.COLOR_HEX[next];
        applyColoursAndPush();
      });
      cell.appendChild(label);
      cell.appendChild(chip);
      wrap.appendChild(cell);
    }
  }

  // --- Generation & runtime push ---

  function buildConfig() {
    const filled = working.sticks - working.emptyStick;
    const seed = (editingLevel | 0) * 1000 + 7;
    return {
      sticks:     working.sticks,
      capacity:   working.capacity,
      emptyStick: working.emptyStick,
      difficulty: working.difficulty,
      colours:    working.colours.slice(0, Math.max(filled, 1)),
      seed,
      generator: 'random-tuned',
      tuningTimeoutMs: working.tuningTimeoutMs,
      requireBonus,
    };
  }

  function applyColoursAndPush() {
    const cfg = buildConfig();
    if (working.abstractBottles) {
      const filled = working.sticks - working.emptyStick;
      const map = {};
      for (let i = 0; i < filled; i++) map[Levels.PALETTE[i]] = working.colours[i];
      cfg.bottles = working.abstractBottles.map(stack =>
        stack.map(c => (map[c] !== undefined ? map[c] : c)));
    }
    Levels.setRuntimeOverride(editingLevel, cfg);
    App.loadLevel(editingLevel);
    renderJson();
  }
  function pushCurrentToRuntime() { applyColoursAndPush(); }

  function generateNow() {
    readScalarsIntoWorking();
    const filled = working.sticks - working.emptyStick;
    const status = $('#le-gen-status');
    if (status) status.textContent = `считаю… (до ${(working.tuningTimeoutMs / 1000).toFixed(1)}с)`;
    clearPending();

    // Используем setTimeout вместо rAF, чтобы статус успел отрендериться
    // даже в фоновых preview-вкладках (rAF там пейзится браузером).
    setTimeout(() => {
      const seed = (editingLevel | 0) * 1000 + 7 + Math.floor(Math.random() * 1_000_000);
      const meta = Levels.generateRandomTuned({
        level: editingLevel,
        sticks: working.sticks,
        capacity: working.capacity,
        emptyStick: working.emptyStick,
        difficulty: working.difficulty,
        colours: Levels.PALETTE.slice(0, Math.max(filled, 1)),  // abstract
        tuningTimeoutMs: working.tuningTimeoutMs,
        seed,
        multiTransfer: true,
        requireBonus,
      });
      working.abstractBottles = meta.bottles;
      const persistableMeta = { ...meta };
      delete persistableMeta.bottles;
      Persist.saveGenMeta(editingLevel, persistableMeta);
      showTuningMeta(meta);
      applyColoursAndPush();
    });
  }

  function showTuningMeta(meta) {
    const status = $('#le-gen-status');
    if (!status) return;
    if (meta.requireBonusFailed) {
      status.innerHTML =
        `<span style="color:#e87">❌ Режим «+1 колба»: за ${formatSec(meta.elapsedMs)} (${meta.attempts} попыток) `
        + `не нашёл раскладку, нерешаемую без бонуса и решаемую с ним. `
        + `Попробуй увеличить difficulty или уменьшить пустых столбиков.</span>`;
      return;
    }
    if (meta.fallback) {
      status.innerHTML = `<span style="color:#e87">⚠ не нашёл решаемой раскладки за ${formatSec(meta.elapsedMs)}; fallback на reverse-shuffle</span>`;
      return;
    }
    const exact = meta.achievedExact
      ? `<span style="color:#7e7">точно ${meta.optimalLength} ход.</span>`
      : `<span style="color:#fb7">≈ ${meta.optimalLength} ход. (цель ${meta.target}, отклонение ${meta.distance})</span>`;
    const bonusTag = meta.requireBonus
      ? ` · <span style="color:#7e7">только с +1 колбой ✓</span>`
      : '';
    status.innerHTML =
      `${exact} · попыток: ${meta.attempts} (подошли: ${meta.solvableAttempts}) · ${formatSec(meta.elapsedMs)}${bonusTag}`;
  }

  // --- JSON envelope ---

  function buildEnvelope() {
    const all = Levels.getAllRuntimeOverrides();
    return {
      _task:
        'Применить как baseline в Levels.DEFAULT_LEVELS внутри index.html. ' +
        'Для каждого ключа N в changes — заменить объект уровня N в Levels.DEFAULT_LEVELS ' +
        '(или ДОБАВИТЬ новый элемент, если N выходит за длину массива; ключи идут подряд от 1, ' +
        'без пропусков) этими полями: sticks, capacity, emptyStick, difficulty, colours, ' +
        'generator, tuningTimeoutMs, seed, requireBonus, bottles. ' +
        'Поле bottles — кэш сгенерированной раскладки; кладётся в DEFAULT_LEVELS и используется ' +
        'напрямую при загрузке уровня (без вызова генератора). ' +
        'Если bottles содержит только пустые столбики — это уровень-заготовка (нажми Сгенерировать).',
      changes: all,
    };
  }

  function renderJson() {
    const env = buildEnvelope();
    $('#le-json').textContent = JSON.stringify(env, null, 2);
    const stats = $('#le-stats');
    if (stats) {
      const n = Object.keys(env.changes).length;
      stats.textContent = n === 0 ? '— нет изменений' : `— уровней с правками: ${n}`;
    }
  }

  async function copyJson() {
    const text = $('#le-json').textContent;
    try {
      await navigator.clipboard.writeText(text);
      Render.toast('JSON скопирован');
    } catch (_e) {
      const range = document.createRange();
      range.selectNode($('#le-json'));
      const sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
      Render.toast('Не удалось получить clipboard, выделил текст вручную');
    }
  }

  // --- Resets ---

  function resetCurrentLevel() {
    Levels.clearRuntimeOverride(editingLevel);
    App.loadLevel(editingLevel);
    loadIntoUI(editingLevel);
    Render.toast(`Reset L${editingLevel}`);
  }
  function clearAllRuntime() {
    Levels.clearAllRuntimeOverrides();
    App.loadLevel(editingLevel);
    loadIntoUI(editingLevel);
    Render.toast('Runtime-правки сброшены');
  }
  function resetAll() {
    Persist.clear();
    Render.toast('Полный сброс — перезагрузка…');
    setTimeout(() => location.reload(), 250);
  }

  // --- Симуляция (наша секция) ---

  let _autoplay = { running: false, abort: false };

  function setSimStatus(msg, kind) {
    const el = $('#dv-sim-status');
    if (!el) return;
    el.textContent = msg;
    el.style.color = kind === 'err' ? 'var(--danger)' : kind === 'ok' ? 'var(--ok)' : 'var(--text-dim)';
  }

  function onAnalyze() {
    const s = State.get();
    if (!s) return;
    if (Solver.isSolved(s.sticks, s.capacity)) { setSimStatus('Уровень уже решён.', 'ok'); return; }
    const tBfs = +$('#dv-bfs-timeout').value || 3000;
    setSimStatus('BFS-поиск...');
    setTimeout(() => {
      const t0 = performance.now();
      const sol = Solver.findShortestPath(s.sticks, s.capacity, tBfs, { multiTransfer: true });
      const tDead = Math.min(2000, Math.floor(tBfs / 3));
      const dead = Solver.findReachableDeadEnds(s.sticks, s.capacity, { multiTransfer: true, timeLimitMs: tDead });
      const ms = (performance.now() - t0) | 0;
      if (sol.length === null) {
        setSimStatus(`✗ Решение не найдено за ${tBfs}мс (explored=${sol.explored}, exhausted=${sol.exhausted}).`, 'err');
        return;
      }
      const firstMove = sol.firstMove
        ? `${sol.firstMove.from}→${sol.firstMove.to}×${sol.firstMove.count}`
        : '—';
      const deadStr = dead.exhausted
        ? (dead.ok ? 'без тупиков ✓' : `тупиков=${dead.deadEnds}/${dead.reachable} ✗`)
        : 'dead-end check: timeout';
      setSimStatus(
        `✓ optimal=${sol.length} ходов, первый=${firstMove}\nexplored=${sol.explored} states, ${deadStr}, ${ms}мс`,
        'ok'
      );
    }, 30);
  }

  async function onAutoplay() {
    const s = State.get();
    if (!s) return;
    if (_autoplay.running) { setSimStatus('Уже играет — нажми «Стоп».', 'err'); return; }
    if (Solver.isSolved(s.sticks, s.capacity)) { setSimStatus('Уровень уже решён.', 'ok'); return; }
    const tBfs = +$('#dv-bfs-timeout').value || 3000;
    const delay = Math.max(80, +$('#dv-autoplay-delay').value || 450);
    _autoplay.running = true;
    _autoplay.abort = false;
    setSimStatus('▶ Автопроход начался...');
    let steps = 0;
    const startMoves = s.moves;
    try {
      while (!_autoplay.abort) {
        const cur = State.get();
        if (!cur) break;
        if (Solver.isSolved(cur.sticks, cur.capacity)) break;
        const sol = Solver.findShortestPath(cur.sticks, cur.capacity, tBfs, { multiTransfer: true });
        if (!sol || sol.firstMove == null) {
          setSimStatus(`✗ Симулятор не нашёл следующий ход (после ${steps} шагов).`, 'err');
          _autoplay.running = false;
          return;
        }
        const { from, to } = sol.firstMove;
        await clickStickViaDOM(from);
        await sleep(60);
        await clickStickViaDOM(to);
        steps++;
        setSimStatus(`▶ Шаг ${steps}: ${from}→${to}×${sol.firstMove.count}, осталось ~${(sol.length - 1)|0} ходов`);
        await sleep(delay);
      }
      const cur = State.get();
      const totalMoves = cur ? cur.moves - startMoves : steps;
      if (cur && Solver.isSolved(cur.sticks, cur.capacity)) {
        setSimStatus(`✓ Победа! ${totalMoves} ходов сделано автопроходом.`, 'ok');
      } else if (_autoplay.abort) {
        setSimStatus(`⏹ Остановлено на ${steps} шаге.`);
      }
    } catch (e) {
      console.error(e);
      setSimStatus('Ошибка: ' + e.message, 'err');
    } finally {
      _autoplay.running = false;
    }
  }

  function onStop() {
    if (_autoplay.running) _autoplay.abort = true;
    else setSimStatus('Автопроход не запущен.');
  }

  function clickStickViaDOM(idx) {
    return new Promise(resolve => {
      const sticks = document.getElementById('sticks');
      if (!sticks || !sticks.children[idx]) { resolve(); return; }
      sticks.children[idx].click();
      requestAnimationFrame(() => resolve());
    });
  }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

  return { open, close, toggle, render };
})();


/* ============================================================
   [TUTORIAL] — анимированная рука 👆 для первого хода на L1.
   Показывается только если игрок ещё ни разу не сделал ход
   (Persist.totalCompleted === 0 && stats.totalMoves === 0).
   Использует Solver.findShortestPath чтобы взять оптимальный
   первый ход и тыкает на колбу-источник → паузу → колбу-приёмник.
   После любого клика по полю — рука прячется навсегда.
   ============================================================ */
/* ============================================================
   [TUTORIAL] — пошаговая «рука» на L1 до самого конца уровня.
   Поведение (ТЗ):
   1. Появляется из прозрачности → указывает на колбу, из которой
      МОЖНО перелить цвет. Колба слегка подсвечивается и единожды
      подпрыгивает. Рука исчезает в прозрачность. Через 3 секунды
      цикл повторяется до тех пор, пока игрок не тапнет эту колбу.
   2. Когда игрок тапнул источник → рука начинает указывать на
      колбу-приёмник.
   3. Если игрок снимает выделение с источника — рука снова
      указывает на источник.
   4. Шаг за шагом ведёт игрока до завершения L1.
   Активируется ТОЛЬКО на L1 у игрока с totalCompleted === 0.
   ============================================================ */
window.Tutorial = (() => {
  const $hand = document.getElementById('tutorial-hand');
  let active = false;
  let holdTimer = null;
  let waitTimer = null;
  let currentTarget = null;          // {idx, kind: 'src'|'dst'}
  const HAND_VISIBLE_MS = 1100;       // 1.1с показываем руку + pulse колбы
  const GAP_BETWEEN_CYCLES_MS = 3000; // 3с между циклами (как в ТЗ)
  const RE_EVAL_DELAY_MS = 40;        // ждём пока State/Render обновятся

  function maybeStart(levelNum) {
    cleanup();
    active = false;
    hideHand(); // на всякий случай чистим всё
    if (levelNum !== 1) return;
    const persisted = Persist.load();
    // Запускаем только если ещё ни один уровень не пройден (= свежий игрок).
    if ((persisted.totalCompleted || 0) > 0) return;
    const s = State.get();
    if (!s) return;
    active = true;
    nextStep();
  }

  /**
   * Главная функция тура: смотрит текущее State и решает, на какую
   * колбу указывать сейчас. Вызывается:
   *   - при старте тура (maybeStart);
   *   - после любого действия игрока (notifyPlayerActed).
   * Если уровень пройден — останавливает тур.
   */
  function nextStep() {
    if (!active) return;
    cleanup();
    const s = State.get();
    if (!s) { stop(); return; }
    if (State.isWon && State.isWon()) { stop(); return; }

    let target = null;
    if (s.selected != null) {
      // Игрок выбрал колбу — указываем на валидное место для слива.
      const dst = findFirstValidDestination(s, s.selected);
      if (dst != null) target = { idx: dst, kind: 'dst' };
    }
    if (!target) {
      // selected пустой — указываем на колбу-источник из оптимального
      // решения. Если решения нет (например, надо +1 колба) — останавливаем.
      let firstMove = null;
      try {
        const sol = Solver.findShortestPath(s.sticks, s.capacity, 800, { multiTransfer: true });
        if (sol && sol.firstMove) firstMove = sol.firstMove;
      } catch (_e) {}
      if (!firstMove) {
        // Fallback: первый произвольный доступный ход.
        firstMove = findAnyMove(s);
      }
      if (!firstMove) { stop(); return; }
      target = { idx: firstMove.from, kind: 'src' };
    }
    currentTarget = target;
    runCycle();
  }

  function findFirstValidDestination(s, srcIdx) {
    const N = s.sticks.length;
    for (let j = 0; j < N; j++) {
      if (j === srcIdx) continue;
      if (State.canMove && State.canMove(srcIdx, j)) return j;
    }
    return null;
  }

  function findAnyMove(s) {
    const N = s.sticks.length;
    for (let i = 0; i < N; i++) {
      if (!s.sticks[i].length) continue;
      for (let j = 0; j < N; j++) {
        if (i === j) continue;
        if (State.canMove && State.canMove(i, j)) return { from: i, to: j };
      }
    }
    return null;
  }

  function runCycle() {
    if (!active || !currentTarget) return;
    showHandAtTarget();
    holdTimer = setTimeout(() => {
      hideHand();
      // Ждём 3 секунды и повторяем цикл (на ту же цель, либо переоценим
      // её перед запуском — состояние могло измениться без действий игрока,
      // хотя обычно меняется только после клика).
      waitTimer = setTimeout(() => {
        // Свежий re-eval перед каждым повтором — если игрок не среагировал
        // и cтранным образом изменилось состояние, возьмём новую цель.
        nextStep();
      }, GAP_BETWEEN_CYCLES_MS);
    }, HAND_VISIBLE_MS);
  }

  function showHandAtTarget() {
    if (!currentTarget) return;
    const sticksEl = document.getElementById('sticks');
    if (!sticksEl) return;
    const bottle = sticksEl.children[currentTarget.idx];
    if (!bottle) return;
    // Снимаем подсветку со всех — на случай если цель сменилась.
    Array.from(sticksEl.children).forEach(b => {
      b.classList.remove('tutorial-target', 'tutorial-pulse');
    });
    bottle.classList.add('tutorial-target');
    // Принудительный reflow, чтобы CSS-анимация tutorialHop стартовала
    // заново даже если класс висел в прошлом цикле.
    void bottle.offsetWidth;
    bottle.classList.add('tutorial-pulse');

    const r = bottle.getBoundingClientRect();
    // 👆 — кончик пальца указывает ВВЕРХ. Чтобы он показывал НА колбу, рука
    // должна находиться чуть ниже её, центр пальца — под центром колбы.
    // В 48×48 emoji-боксе кончик пальца у Segoe UI / Apple Color Emoji
    // ≈ (50%, 14%) от верх-лево. Высчитываем top-left так, чтобы кончик
    // пальца попал точно в нижнюю кромку колбы.
    const HAND_W = 48, HAND_H = 48;
    const TIP_X_FRAC = 0.50;
    const TIP_Y_FRAC = 0.14;
    // Цель кончика пальца: чуть выше нижней кромки колбы, под её центром.
    // Чуть выше (а не точно на кромке) — чтобы визуально палец «заходил»
    // в колбу, а не висел снаружи.
    const tipX = r.left + r.width / 2;
    const tipY = r.bottom - r.height * 0.05;
    $hand.style.left = (tipX - HAND_W * TIP_X_FRAC) + 'px';
    $hand.style.top  = (tipY - HAND_H * TIP_Y_FRAC) + 'px';
    $hand.classList.add('show', 'tapping');
  }

  function hideHand() {
    $hand.classList.remove('show', 'tapping');
    const sticksEl = document.getElementById('sticks');
    if (sticksEl) {
      Array.from(sticksEl.children).forEach(b => {
        b.classList.remove('tutorial-target', 'tutorial-pulse');
      });
    }
  }

  function stop() {
    active = false;
    hideHand();
    cleanup();
    currentTarget = null;
  }

  function cleanup() {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    if (waitTimer) { clearTimeout(waitTimer); waitTimer = null; }
  }

  // Зовётся из App.onStickClick после любого результата State.clickStick.
  // Пересчитываем шаг с небольшой задержкой, чтобы State + DOM успели
  // прийти в финальное состояние (особенно при пересборе колб в animatePour).
  function notifyPlayerActed() {
    if (!active) return;
    cleanup();
    hideHand();
    setTimeout(() => nextStep(), RE_EVAL_DELAY_MS);
  }

  return { maybeStart, notifyPlayerActed, stop };
})();

/* ============================================================
   [APP] — bootstrap, обработчики кликов, win flow.
   ============================================================ */
window.App = (() => {
  let session = null;       // { levelNum, params }
  let transferLocked = false;
  // Счётчик пройденных уровней ИМЕННО в этой игровой сессии (in-memory,
  // на reload сбрасывается). Используется для триггера Rate-us перед
  // 2-м уровнем сессии.
  let sessionCompletedCount = 0;
  // Флаг "Rate-us уже показывался в этой сессии" — не показываем повторно.
  let rateUsShownThisSession = false;

  // ===== Интерстишл политика =====
  // 1) Показываем только после прохождения 5+ уровня
  // 2) Только если игрок «дёргал» уровень (undo / +колба за рекламу)
  // 3) Cooldown 2 мин между показами; cooldown сбрасывается при перезапуске
  //    приложения (хранится в памяти, не в localStorage)
  // 4) Если предыдущий показ не успел зарезолвиться (закрыл приложение),
  //    и прошло < 5 мин — показываем сразу на старте.
  const INTERSTITIAL_MIN_COMPLETED_LEVEL = 5;   // показ только после прохождения L≥5
  const INTERSTITIAL_COOLDOWN_MS         = 2 * 60 * 1000;  // 2 минуты
  const INTERSTITIAL_RECOVERY_MS         = 5 * 60 * 1000;  // 5 минут на восстановление
  const INTERSTITIAL_SHOW_TIMEOUT_MS     = 90 * 1000;      // safety: не зависать дольше 90с
  // In-memory cooldown — на сессию игры. Сбрасывается при перезапуске.
  let lastInterstitialAtMs = 0;

  function shouldShowInterstitialNow(justCompletedLevel, flagged) {
    if (!flagged) return false;
    if (justCompletedLevel < INTERSTITIAL_MIN_COMPLETED_LEVEL) return false;
    if (Date.now() - lastInterstitialAtMs < INTERSTITIAL_COOLDOWN_MS) return false;
    return true;
  }

  /**
   * Показывает интерстишл и затем грузит nextLevel.
   *   - Перед запуском помечает в Persist'е timestamp начала (для recovery).
   *   - При успешном завершении (промис зарезолвился) выставляет cooldown.
   *   - При закрытии приложения посреди рекламы — pendingAt остаётся в LS,
   *     и при следующем запуске App.start этот же путь повторится (см. start).
   *   - safety timeout: если backend завис и промис не резолвится >90с,
   *     просто загружаем уровень без cooldown'а.
   */
  async function presentInterstitialThenLoad(nextLevel) {
    Render.toast('Реклама...', 1200);
    Persist.markInterstitialPending(Date.now());
    let watched = false;
    try {
      const result = await Promise.race([
        Ads.showInterstitial().then(() => 'done'),
        new Promise(resolve => setTimeout(() => resolve('timeout'), INTERSTITIAL_SHOW_TIMEOUT_MS)),
      ]);
      watched = result === 'done';
    } catch (e) {
      console.warn('[Ads] interstitial show failed', e);
    } finally {
      Persist.clearInterstitialPending();
      if (watched) lastInterstitialAtMs = Date.now();
      loadLevel(nextLevel);
    }
  }

  async function start() {
    const persisted = Persist.load();
    // Игровая сессия = запуск приложения. Инкрементим счётчик, чтобы
    // отличить «первую сессию» (sessionCount=1) от последующих (>=2).
    persisted.sessionCount = (persisted.sessionCount || 0) + 1;
    Persist.save(persisted);
    sessionCompletedCount = 0;
    rateUsShownThisSession = false;
    await Ads.init().catch(() => {});

    // Recovery: если меньше 5 минут назад был неотданный интерстишл —
    // показываем его сейчас и только потом грузим уровень.
    const pendingAt = Persist.loadInterstitialPending();
    if (pendingAt && Date.now() - pendingAt < INTERSTITIAL_RECOVERY_MS) {
      console.log('[Ads] recovery: показываем недосмотренный интерстишл');
      wireEvents();
      await presentInterstitialThenLoad(persisted.level || 1);
      return;
    }
    if (pendingAt) Persist.clearInterstitialPending(); // истёкший флаг — чистим
    loadLevel(persisted.level || 1);
    wireEvents();
  }

  // Помечает текущий уровень как «дёрганый» — игрок использовал откат
  // или бонусную колбу. По окончании уровня (onNext) это станет
  // одним из условий показа интерстишла. snapshotRun сохранит флаг в LS,
  // чтобы reload не сбросил его.
  function flagInterstitialTrigger() {
    const s = State.get();
    if (s) {
      s.interstitialFlagged = true;
      // не зовём snapshotRun здесь — onUndo/onBonus уже сами зовут после.
    }
  }

  function loadLevel(levelNum) {
    // Сначала проверяем savedRun: если есть и он для этого же уровня —
    // восстанавливаем поле, историю ходов и метаданные без новой генерации.
    const savedRun = Persist.loadSavedRun();
    if (savedRun && savedRun.level === levelNum
        && Array.isArray(savedRun.currentBottles)
        && Array.isArray(savedRun.initialBottles)) {
      restoreFromSavedRun(savedRun);
      return;
    }

    const params = Levels.getParams(levelNum);
    Render.toast(`Уровень ${levelNum}: генерация...`, 600);
    // Генератор может быть тяжёлым на старших уровнях — даём UI отрендерить
    // toast перед блокирующим вызовом.
    setTimeout(() => {
      const bottles = Levels.generate(params);
      State.init({
        level: levelNum,
        capacity: params.capacity,
        sticks: bottles.map(s => [...s]),
      });

      // Считаем сложность как мета-параметр УРОВНЯ (а не от размера поля).
      // Если в params.requireBonus стоит true (уровень сгенерирован с
      // требованием бонуса) — это сразу «Очень сложно». Иначе считаем
      // оптимальное число ходов BFS-ом и кладём на state, чтобы renderHud
      // мог отобразить tier'ом (см. getDifficulty).
      const s = State.get();
      s.requireBonus = params.requireBonus === true;
      // Если у нас уже есть кэшированная мета (savedMeta от дев-панели) —
      // берём optimalLength оттуда без повторного запуска BFS.
      const savedMeta = window.Persist && window.Persist.loadGenMeta
        ? window.Persist.loadGenMeta(levelNum) : null;
      if (savedMeta && Number.isFinite(savedMeta.optimalLength)) {
        s.optimalSteps = savedMeta.optimalLength;
      } else {
        try {
          // Таймаут BFS подобран так, чтобы не тормозить переход уровня
          // даже на «Очень сложно»: на не-решаемых раскладках вернёт null.
          const sol = Solver.findShortestPath(bottles, params.capacity, 1500);
          s.optimalSteps = Number.isFinite(sol.length) ? sol.length : null;
        } catch (_e) {
          s.optimalSteps = null;
        }
      }

      // Сохраняем стартовое состояние нового уровня — чтобы перезаход в
      // приложение восстанавливал именно его, и чтобы undo мог откатиться
      // до самого начала.
      const initialCopy = bottles.map(b => [...b]);
      Persist.saveSavedRun({
        level: levelNum,
        params,
        initialBottles: initialCopy,
        currentBottles: initialCopy.map(b => [...b]),
        history: [],
        moves: 0,
        bonusUsedThisLevel: false,
        interstitialFlagged: false,
        optimalSteps: s.optimalSteps,
        requireBonus: s.requireBonus,
      });

      session = { levelNum, params };
      Render.renderAll();
      Render.hideWin();
      // Туториал — только на L1, и только если игрок ещё не прошёл ни одного уровня.
      if (window.Tutorial) Tutorial.maybeStart(levelNum);
    }, 30);
  }

  /**
   * Восстанавливает поле/историю/мету из savedRun без перегенерации.
   * Вызывается из loadLevel'а, когда мы повторно заходим в активный уровень.
   */
  function restoreFromSavedRun(savedRun) {
    const params = savedRun.params || Levels.getParams(savedRun.level);
    State.init({
      level: savedRun.level,
      capacity: params.capacity,
      sticks: savedRun.currentBottles.map(b => [...b]),
    });
    const s = State.get();
    // Восстанавливаем историю ходов и мета.
    s.history = (savedRun.history || []).map(h => ({ ...h }));
    s.moves = savedRun.moves || 0;
    s.bonusUsedThisLevel = !!savedRun.bonusUsedThisLevel;
    s.interstitialFlagged = !!savedRun.interstitialFlagged;
    s.optimalSteps = savedRun.optimalSteps;
    s.requireBonus = !!savedRun.requireBonus;
    // initial — нужен для определения «уровень в исходном состоянии».
    s.initial = savedRun.initialBottles.map(b => [...b]);

    session = { levelNum: savedRun.level, params };
    Render.renderAll();
    Render.hideWin();
    if (window.Tutorial) Tutorial.maybeStart(savedRun.level);
  }

  /**
   * Снимает текущее состояние с State и сохраняет в localStorage. Зовётся
   * после каждого хода игрока (move, undo, bonus). Реактивно держит
   * savedRun свежим, чтобы reload восстанавливал именно то, что было.
   * При бонусе initial тоже растёт на +1 пустую колбу — обновляем и его.
   */
  function snapshotRun() {
    const s = State.get();
    if (!s) return;
    Persist.updateSavedRun({
      initialBottles: (s.initial || []).map(b => [...b]),
      currentBottles: s.sticks.map(b => [...b]),
      history: (s.history || []).map(h => ({ ...h })),
      moves: s.moves || 0,
      bonusUsedThisLevel: !!s.bonusUsedThisLevel,
      interstitialFlagged: !!s.interstitialFlagged,
    });
  }

  function wireEvents() {
    document.getElementById('sticks').addEventListener('click', (e) => {
      const bottle = e.target.closest('.bottle');
      if (!bottle) return;
      // Клик по «+» колбе — активируем бонус через rewarded ad.
      if (bottle.dataset.role === 'add') { onBonus(); return; }
      const idx = +bottle.dataset.idx;
      if (Number.isNaN(idx)) return;
      onStickClick(idx);
    });

    document.getElementById('btn-undo').addEventListener('click', onUndo);
    document.getElementById('btn-next').addEventListener('click', onNext);

    // 5-кратный тап по заголовку «Уровень N» открывает дев-панель.
    // Кнопки шестерёнки больше нет — это скрытый вход для разработчика.
    const lvlTap = document.getElementById('hud-level-tap');
    let tapCount = 0, tapTimer = null;
    if (lvlTap) lvlTap.addEventListener('click', () => {
      tapCount++;
      clearTimeout(tapTimer);
      tapTimer = setTimeout(() => { tapCount = 0; }, 1500);
      if (tapCount >= 5) {
        tapCount = 0;
        DevPanel.open();
      }
    });
  }

  async function onStickClick(idx) {
    if (transferLocked) return;
    const prev = State.get();
    const prevSelected = prev ? prev.selected : null;
    const prevTopColor = prev && prevSelected !== null && prev.sticks[prevSelected].length
      ? prev.sticks[prevSelected][prev.sticks[prevSelected].length - 1]
      : null;
    const result = State.clickStick(idx);
    if (result === 'invalid') return;
    if (result === 'moved' && prevSelected !== null && prevTopColor) {
      // Не рендерим сразу — оставляем pre-move DOM (источник со всеми
      // слоями). animatePour сам перерисует src/dst колбы на post-move
      // состояние в нужный момент (когда из горлышка начинает литься).
      transferLocked = true;
      try { await Render.animatePour(prevSelected, idx, prevTopColor); }
      finally { transferLocked = false; }
      Render.renderAll(); // финальный полный rerender — подстраховка
      snapshotRun(); // сохраняем поле + историю после удачного хода
      // Туториальная рука может теперь указать на следующий шаг — но
      // только ПОСЛЕ анимации перелива, чтобы не появлялась посреди.
      if (window.Tutorial) Tutorial.notifyPlayerActed();
      if (State.isWon()) onWin();
      return;
    }
    Render.renderAll(); // selected/deselected/switched/locked
    // Для нон-moved результатов туториал реагирует сразу.
    if (window.Tutorial) Tutorial.notifyPlayerActed();
    return;
  }

  function onUndo() {
    const s = State.get();
    if (!s || s.history.length === 0) { Render.toast('Нечего отменять'); return; }
    State.undo();
    const persisted = Persist.load();
    persisted.stats.undoUsed = (persisted.stats.undoUsed || 0) + 1;
    Persist.save(persisted);
    flagInterstitialTrigger();
    Render.renderAll();
    snapshotRun(); // откат — тоже состояние, его надо сохранить
  }

  function onWin() {
    const s = State.get();
    transferLocked = true;
    const persisted = Persist.load();
    persisted.totalCompleted = (persisted.totalCompleted || 0) + 1;
    persisted.stats.totalMoves = (persisted.stats.totalMoves || 0) + (s ? s.moves : 0);
    // Следующий уровень сохраним заранее, чтобы перезагрузка после победы
    // показывала уже новый.
    persisted.level = (s ? s.level : 1) + 1;
    // Очищаем savedRun — этот уровень пройден; следующая loadLevel
    // сгенерирует новый.
    persisted.savedRun = null;
    Persist.save(persisted);
    sessionCompletedCount++;
    // Прогреваем интерстишл на фоне, пока игрок читает модал — на native
    // wrapper preload идёт в его SDK, у нас он no-op для других backend'ов.
    if (window.Ads && Ads.preloadInterstitial) {
      try { Ads.preloadInterstitial(); } catch (_e) {}
    }
    Render.showWin(`Молодец! Готов к уровню ${persisted.level}?`);
  }

  // ===== Rate-us политика =====
  // Показ окна Rate-us, если выполняется одно из условий:
  //   (A) Только что пройден L3 (одноразовый триггер, persisted.rateUsShownAtL3).
  //   (B) Это 2-й уровень в текущей сессии И сессия не первая.
  // Никогда не показываем, если:
  //   - игрок уже хоть раз нажал «Оценить» (persisted.rateUsCompleted);
  //   - окно уже показывалось в этой сессии (rateUsShownThisSession).
  function shouldShowRateUs(justCompletedLevel) {
    if (rateUsShownThisSession) return false;
    const persisted = Persist.load();
    if (persisted.rateUsCompleted) return false;
    const triggerL3 = justCompletedLevel === 3 && !persisted.rateUsShownAtL3;
    const triggerSession = (persisted.sessionCount || 0) > 1
                        && sessionCompletedCount === 1;
    return triggerL3 || triggerSession;
  }

  /**
   * Показывает Rate-us модалку и колбэкает после её закрытия. Кнопки:
   *   - «Оценить»     → отмечаем rateUsCompleted=true (больше не показываем),
   *                     открываем заглушку стора (window.open noop), callback.
   *   - «Может позже» → просто закрываем, callback.
   *
   * Вызывается из onNext до проверки интерстишла. Тем самым обеспечивается
   * порядок: Rate-us → (опционально) интерстишл → loadLevel. Никогда
   * Rate-us не появляется ПОСЛЕ интерстишла.
   */
  function showRateUsThen(callback) {
    rateUsShownThisSession = true;
    const persisted = Persist.load();
    // L3-триггер — одноразовый; помечаем сразу при показе.
    const s = State.get();
    if (s && s.level === 3) {
      persisted.rateUsShownAtL3 = true;
      Persist.save(persisted);
    }
    const onRate = () => {
      detachRateUsHandlers();
      const p = Persist.load();
      p.rateUsCompleted = true;
      Persist.save(p);
      // Заглушка перехода в стор. В production-APK подменяется на
      // window.open('market://details?id=...') или RuStore URL.
      try { window.open('about:blank', '_blank'); } catch (_e) {}
      Render.hideRateUs();
      callback();
    };
    const onLater = () => {
      detachRateUsHandlers();
      Render.hideRateUs();
      callback();
    };
    const btnRate = document.getElementById('btn-rateus-rate');
    const btnLater = document.getElementById('btn-rateus-later');
    btnRate.addEventListener('click', onRate);
    btnLater.addEventListener('click', onLater);
    function detachRateUsHandlers() {
      btnRate.removeEventListener('click', onRate);
      btnLater.removeEventListener('click', onLater);
    }
    Render.showRateUs();
  }

  function onNext() {
    transferLocked = false;
    // Между уровнями дев-панель закрываем — она для редактирования
    // конкретного уровня и не должна болтаться через переход.
    if (window.DevPanel) DevPanel.close();
    const s = State.get();
    const justCompletedLevel = s ? s.level : 0;
    const flagged = !!(s && s.interstitialFlagged);
    const persisted = Persist.load();
    const nextLevel = persisted.level;

    // Цепочка: Rate-us (если пора) → интерстишл (если пора) → loadLevel.
    // Rate-us ВСЕГДА ПЕРВЫМ, чтобы не показываться после рекламы.
    const proceedAfterRateUs = () => {
      if (shouldShowInterstitialNow(justCompletedLevel, flagged)) {
        presentInterstitialThenLoad(nextLevel);
      } else {
        loadLevel(nextLevel);
      }
    };
    if (shouldShowRateUs(justCompletedLevel)) {
      showRateUsThen(proceedAfterRateUs);
    } else {
      proceedAfterRateUs();
    }
  }

  function onBonus() {
    const s = State.get();
    if (!s || s.bonusUsedThisLevel) { Render.toast('Бонус уже использован'); return; }
    if (s.sticks.length >= 13) { Render.toast('Больше колб не помещается'); return; }
    Render.toast('Реклама...', 1500);
    Ads.showRewarded().then(res => {
      if (!res || !res.rewarded) { Render.toast('Реклама не была досмотрена'); return; }
      if (State.addBonusBottle()) {
        const persisted = Persist.load();
        persisted.stats.bonusUsed = (persisted.stats.bonusUsed || 0) + 1;
        Persist.save(persisted);
        flagInterstitialTrigger();
        Render.renderAll();
        Render.toast('+1 колба (бонус)');
        snapshotRun(); // бонус добавил +1 пустую колбу — это новое состояние
      }
    });
  }

  return { start, loadLevel };
})();

document.addEventListener('DOMContentLoaded', () => App.start());
console.log('[GlitterSort] All modules loaded');
</script>
</body>
</html>
