<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1238">
<title>GlitterSort — Колбочки</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='22' y='8' width='20' height='48' rx='10' fill='%23ec4899' stroke='%23fff' stroke-width='3'/></svg>">
<style>
/* ============================================================
   GlitterSort — single-file HTML game
   See docs/ARCHITECTURE.md for module map.
   ============================================================ */

:root{
  --bg-1:#1a1238;
  --bg-2:#2a1858;
  --bg-3:#3a1d72;
  --panel:rgba(255,255,255,.07);
  --panel-border:rgba(255,255,255,.14);
  --text:#f1eaff;
  --text-dim:#a59bd1;
  --accent:#ffd86b;
  --accent-2:#ff7ac6;
  --danger:#ff5b73;
  --ok:#7be37b;

  /* Колбочки */
  --c-pink:#ff5fa2;
  --c-orange:#ff8a2b;
  --c-yellow:#ffd23f;
  --c-lime:#9bdc2f;
  --c-teal:#22d3c8;
  --c-blue:#3a8bff;
  --c-purple:#b65bff;
  --c-crimson:#ef3a5d;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg-1);font-family:'Russo One','Segoe UI',system-ui,sans-serif;color:var(--text);user-select:none;-webkit-user-select:none;touch-action:manipulation}
body{
  background:
    radial-gradient(ellipse at top, var(--bg-3) 0%, var(--bg-2) 35%, var(--bg-1) 75%),
    var(--bg-1);
  background-attachment:fixed;
}

#app{position:fixed;inset:0;display:flex;flex-direction:column;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}

/* ===== HEADER ===== */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px 8px;
  flex:0 0 auto;
}
.level-badge{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:14px;
  padding:8px 18px;
  font-size:18px;
  letter-spacing:.5px;
  box-shadow:0 4px 12px rgba(0,0,0,.25);
}
.level-badge b{color:var(--accent);font-weight:400}
.moves-pill{
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:14px;
  padding:8px 14px;
  font-size:14px;
  color:var(--text-dim);
  min-width:74px;
  text-align:center;
}
.moves-pill b{color:var(--text);font-weight:400}

/* ===== PLAYFIELD ===== */
.field{
  flex:1 1 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:8px;
  position:relative;
  overflow:hidden;
}
.sticks{
  display:grid;
  gap:clamp(8px,2.5vw,18px);
  width:100%;
  max-width:560px;
  align-items:end;
  justify-items:center;
  padding:8px;
}

/* layout by stick count — set via [data-count] on .sticks */
.sticks[data-count="3"]{grid-template-columns:repeat(3,1fr)}
.sticks[data-count="4"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="5"]{grid-template-columns:repeat(5,1fr)}
.sticks[data-count="6"]{grid-template-columns:repeat(3,1fr)}
.sticks[data-count="7"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="8"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="9"]{grid-template-columns:repeat(5,1fr)}
.sticks[data-count="10"]{grid-template-columns:repeat(5,1fr)}
.sticks[data-count="11"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="12"]{grid-template-columns:repeat(4,1fr)}
.sticks[data-count="13"]{grid-template-columns:repeat(5,1fr)}

/* ===== BOTTLE ===== */
.bottle{
  position:relative;
  width:100%;
  max-width:64px;
  aspect-ratio:1 / 2.6;
  background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04));
  border:2px solid rgba(255,255,255,.4);
  border-top:none;
  border-radius:8px 8px 24px 24px / 8px 8px 30px 30px;
  cursor:pointer;
  overflow:hidden;
  display:flex;
  flex-direction:column-reverse;
  transition:transform .22s cubic-bezier(.4,0,.25,1);
  box-shadow:
    inset 4px 0 4px -3px rgba(255,255,255,.4),
    inset -4px 0 4px -3px rgba(0,0,0,.3),
    0 4px 8px rgba(0,0,0,.3);
}
.bottle::before{
  content:'';position:absolute;left:50%;top:-6px;transform:translateX(-50%);
  width:calc(100% + 12px);height:8px;
  background:rgba(255,255,255,.5);
  border-radius:6px;
  box-shadow:0 2px 4px rgba(0,0,0,.3);
  pointer-events:none;
}
.bottle.selected{
  transform:translateY(-16px);
  border-color:var(--accent);
  box-shadow:
    inset 4px 0 4px -3px rgba(255,255,255,.4),
    inset -4px 0 4px -3px rgba(0,0,0,.3),
    0 8px 16px rgba(255,216,107,.35),
    0 0 0 2px rgba(255,216,107,.5);
}
.bottle.completed{
  border-color:var(--ok);
  box-shadow:
    inset 4px 0 4px -3px rgba(255,255,255,.4),
    inset -4px 0 4px -3px rgba(0,0,0,.3),
    0 4px 8px rgba(0,0,0,.3),
    0 0 0 2px rgba(123,227,123,.4);
}
.bottle .layer{
  width:100%;
  background:var(--layer-color, #888);
  transition:height .25s ease, background .15s ease;
  position:relative;
  flex:0 0 auto;
  /* Высота = 100% / capacity. Capacity передаётся через --cap на .bottle. */
  height:calc(100% / var(--cap, 4));
}
.bottle .layer::after{
  content:'';position:absolute;left:0;right:0;top:0;height:4px;
  background:linear-gradient(180deg, rgba(255,255,255,.35), rgba(255,255,255,0));
  pointer-events:none;
}
.bottle .layer.c-pink   {background:var(--c-pink)}
.bottle .layer.c-orange {background:var(--c-orange)}
.bottle .layer.c-yellow {background:var(--c-yellow)}
.bottle .layer.c-lime   {background:var(--c-lime)}
.bottle .layer.c-teal   {background:var(--c-teal)}
.bottle .layer.c-blue   {background:var(--c-blue)}
.bottle .layer.c-purple {background:var(--c-purple)}
.bottle .layer.c-crimson{background:var(--c-crimson)}
.bottle .layer.is-new{animation:layerDrop .35s cubic-bezier(.4,0,.25,1)}
@keyframes layerDrop{
  0%{transform:translateY(-20px);opacity:.0}
  60%{transform:translateY(2px);opacity:1}
  100%{transform:translateY(0);opacity:1}
}
.bottle.pouring .layer:last-child{animation:layerPour .25s ease forwards}
@keyframes layerPour{
  0%{transform:translateY(0);opacity:1}
  100%{transform:translateY(-14px);opacity:0}
}

/* ===== BOTTOM BAR ===== */
.bottom{
  flex:0 0 auto;
  display:flex;
  gap:10px;
  padding:10px 14px 18px;
  align-items:center;
  justify-content:center;
}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  min-width:64px;height:56px;
  padding:0 16px;
  background:var(--panel);
  border:1px solid var(--panel-border);
  border-radius:16px;
  color:var(--text);
  font-family:inherit;font-size:14px;
  cursor:pointer;
  transition:transform .1s, background .15s, border-color .15s;
  box-shadow:0 4px 10px rgba(0,0,0,.25);
}
.btn:active{transform:translateY(2px)}
.btn[disabled]{opacity:.4;cursor:not-allowed}
.btn .ico{width:24px;height:24px;display:inline-block}
.btn-primary{background:linear-gradient(180deg,#ff7ac6,#b65bff);border-color:rgba(255,255,255,.3)}
.btn-bonus{background:linear-gradient(180deg,#ffd23f,#ff8a2b);color:#3b1300;border-color:#ffb44e}
.btn-bonus .ico-play{color:#3b1300}
.btn small{display:block;font-size:10px;opacity:.7;margin-top:2px}

/* ===== MODAL ===== */
.modal-wrap{
  position:fixed;inset:0;
  background:rgba(10,4,30,.7);
  display:none;
  align-items:center;justify-content:center;
  z-index:50;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}
.modal-wrap.open{display:flex}
.modal{
  background:linear-gradient(180deg,#3a1d72,#1a1238);
  border:1px solid var(--panel-border);
  border-radius:24px;
  padding:28px 26px 22px;
  width:min(86vw,360px);
  text-align:center;
  box-shadow:0 12px 40px rgba(0,0,0,.5);
}
.modal h2{font-size:28px;margin-bottom:8px;color:var(--accent)}
.modal p{color:var(--text-dim);margin-bottom:20px;font-size:14px;line-height:1.5}
.modal .btn{width:100%;height:54px;font-size:16px}

/* ===== DEV PANEL ===== */
.dev{
  position:fixed;top:8px;left:8px;right:8px;bottom:8px;
  background:rgba(8,4,26,.96);
  border:1px solid var(--panel-border);
  border-radius:16px;
  z-index:100;
  display:none;
  flex-direction:column;
  padding:16px;
  font-size:12px;
  overflow:hidden;
}
.dev.open{display:flex}
.dev-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.dev-head h3{font-size:14px;color:var(--accent)}
.dev-body{flex:1 1 auto;overflow:auto;padding-right:6px}
.dev-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.dev-row label{flex:0 0 130px;color:var(--text-dim)}
.dev input[type=number],.dev select{
  flex:1 1 80px;min-width:60px;padding:6px 8px;
  background:rgba(255,255,255,.06);
  border:1px solid var(--panel-border);
  border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;
}
.dev input[type=checkbox]{transform:scale(1.2);margin-right:4px}
.dev .swatches{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.dev .sw{
  width:28px;height:28px;border-radius:8px;border:2px solid transparent;cursor:pointer;
  background:var(--sw-color);box-shadow:inset 0 0 0 1px rgba(0,0,0,.3)
}
.dev .sw.on{border-color:var(--accent);box-shadow:0 0 0 2px rgba(255,216,107,.4)}
.dev .actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.dev .actions button{
  flex:1;min-width:120px;padding:10px;
  background:rgba(255,255,255,.08);border:1px solid var(--panel-border);border-radius:10px;
  color:var(--text);font-family:inherit;font-size:12px;cursor:pointer;
}
.dev .actions .primary{background:linear-gradient(180deg,#ff7ac6,#b65bff);font-weight:bold}
.dev .status{
  margin-top:8px;padding:8px 10px;
  background:rgba(255,255,255,.04);
  border-radius:8px;
  color:var(--text-dim);
  font-family:'Consolas',monospace;font-size:11px;
  white-space:pre-wrap;min-height:34px;
}

/* ===== TOAST ===== */
.toast{
  position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);
  background:rgba(20,10,50,.92);
  border:1px solid var(--panel-border);
  padding:10px 18px;border-radius:12px;
  color:var(--text);font-size:14px;
  opacity:0;transition:all .25s;
  pointer-events:none;
  z-index:60;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ===== MOBILE TWEAKS ===== */
@media (max-width:380px){
  .level-badge{font-size:16px;padding:6px 14px}
  .moves-pill{font-size:13px;padding:6px 12px}
  .btn{min-width:56px;height:50px;padding:0 12px;font-size:13px}
  .sticks{gap:8px}
}
@media (max-height:640px){
  .header{padding:8px 16px 4px}
  .bottom{padding:6px 14px 12px}
  .btn{height:48px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="level-badge">Уровень <b id="hud-level">1</b></div>
    <div class="moves-pill">Ходов: <b id="hud-moves">0</b></div>
  </div>

  <div class="field">
    <div id="sticks" class="sticks" data-count="3"></div>
  </div>

  <div class="bottom">
    <button class="btn" id="btn-undo" aria-label="Ход назад" title="Ход назад">
      <span class="ico">↶</span>
      <span>Назад</span>
    </button>
    <button class="btn btn-bonus" id="btn-bonus" aria-label="+ Колба" title="+ Колба за рекламу">
      <span class="ico">＋</span>
      <span>Колба<small>за рекламу</small></span>
    </button>
    <button class="btn" id="btn-restart" aria-label="Заново" title="Заново">
      <span class="ico">↻</span>
      <span>Заново</span>
    </button>
  </div>
</div>

<div class="modal-wrap" id="win-modal">
  <div class="modal">
    <h2>Уровень пройден!</h2>
    <p id="win-text">Молодец! Готов к следующему?</p>
    <button class="btn btn-primary" id="btn-next">Дальше →</button>
  </div>
</div>

<div class="dev" id="dev-panel">
  <div class="dev-head">
    <h3>🛠 Дев-панель уровня</h3>
    <button id="dev-close" style="background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer">×</button>
  </div>
  <div class="dev-body" id="dev-body">
    <!-- Заполняется DevPanel.render() -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   GlitterSort — single-file game logic
   ------------------------------------------------------------
   Sections (Ctrl+F to jump):
     [LEVELS]   Палитра, дефолтные уровни, генераторы, endless
     [SOLVER]   BFS-решатель, dead-end detection
     [STATE]    Игровое состояние, ходы, undo, win-проверка
     [PERSIST]  localStorage save/load
     [RENDER]   Отрисовка колбочек и HUD
     [ADS]      Реклама (Native bridge / YaGames / Mock)
     [DEVPANEL] Редактор параметров уровня
     [APP]      Bootstrap, обработчики кликов, win flow
   ============================================================ */

/* ============================================================
   [SOLVER] — BFS shortest-path + dead-end detection.
   Portирован из RC_Colbs_v2/game/solver.js. Используется
   генератором random-tuned и (опционально) системой подсказок.
   ============================================================ */
window.Solver = (() => {
  function findShortestPath(initial, capacity, timeLimitMs = 1000, options = {}) {
    const multi = options.multiTransfer !== false;
    const t0 = performance.now();
    if (isSolved(initial, capacity)) {
      return { length: 0, explored: 1, time: 0, exhausted: true, firstMove: null };
    }
    const visited = new Set();
    visited.add(hashState(initial));
    const queue = [{ state: initial.map(b => [...b]), depth: 0, firstMove: null }];
    let head = 0;
    let bestLength = Infinity;
    let bestFirstMove = null;
    let explored = 0;
    let timedOut = false;
    let checkCtr = 0;

    while (head < queue.length) {
      if ((checkCtr++ & 0xFFF) === 0 && performance.now() - t0 > timeLimitMs) {
        timedOut = true;
        break;
      }
      const cur = queue[head++];
      if (cur.depth + 1 >= bestLength) continue;
      explored++;

      const moves = enumerateMoves(cur.state, capacity, multi);
      for (const m of moves) {
        const k = m.count || 1;
        for (let i = 0; i < k; i++) cur.state[m.to].push(cur.state[m.from].pop());
        const newDepth = cur.depth + 1;
        const lineFirst = cur.firstMove || { from: m.from, to: m.to, count: k };
        if (isSolved(cur.state, capacity)) {
          if (newDepth < bestLength) {
            bestLength = newDepth;
            bestFirstMove = lineFirst;
          }
          for (let i = 0; i < k; i++) cur.state[m.from].push(cur.state[m.to].pop());
          continue;
        }
        if (newDepth + 1 < bestLength) {
          const h = hashState(cur.state);
          if (!visited.has(h)) {
            visited.add(h);
            queue.push({
              state: cur.state.map(b => [...b]),
              depth: newDepth,
              firstMove: lineFirst,
            });
          }
        }
        for (let i = 0; i < k; i++) cur.state[m.from].push(cur.state[m.to].pop());
      }
    }
    return {
      length: bestLength === Infinity ? null : bestLength,
      explored,
      time: performance.now() - t0,
      exhausted: !timedOut,
      firstMove: bestFirstMove,
    };
  }

  function enumerateMoves(state, capacity, multi = true) {
    const N = state.length;
    const out = [];
    for (let a = 0; a < N; a++) {
      const sa = state[a];
      if (sa.length === 0) continue;
      const top = sa[sa.length - 1];
      let runLen = 0;
      for (let i = sa.length - 1; i >= 0 && sa[i] === top; i--) runLen++;
      for (let b = 0; b < N; b++) {
        if (a === b) continue;
        const sb = state[b];
        if (sb.length >= capacity) continue;
        if (sb.length > 0 && sb[sb.length - 1] !== top) continue;
        const room = capacity - sb.length;
        const count = multi ? Math.min(runLen, room) : 1;
        if (count <= 0) continue;
        out.push({ from: a, to: b, count });
      }
    }
    return out;
  }

  function isSolved(state, capacity) {
    return state.every(s =>
      s.length === 0 ||
      (s.length === capacity && s.every(c => c === s[0])));
  }

  function hashState(state) {
    return state.map(s => s.join(',')).join('|');
  }

  function findReachableDeadEnds(initial, capacity, options = {}) {
    const multi = options.multiTransfer !== false;
    const timeLimitMs = options.timeLimitMs ?? 2000;
    const t0 = performance.now();

    const reachable = new Set();
    const goals = [];
    const predecessors = new Map();

    const startHash = hashState(initial);
    reachable.add(startHash);
    if (isSolved(initial, capacity)) goals.push(startHash);

    const queue = [{ state: initial.map(b => [...b]), hash: startHash }];
    let head = 0;
    let timedOut = false;
    let checkCtr = 0;

    while (head < queue.length) {
      if ((checkCtr++ & 0xFFF) === 0 && performance.now() - t0 > timeLimitMs) {
        timedOut = true;
        break;
      }
      const cur = queue[head++];
      const moves = enumerateMoves(cur.state, capacity, multi);
      for (const m of moves) {
        const k = m.count || 1;
        for (let i = 0; i < k; i++) cur.state[m.to].push(cur.state[m.from].pop());
        const nextHash = hashState(cur.state);
        if (!reachable.has(nextHash)) {
          reachable.add(nextHash);
          if (isSolved(cur.state, capacity)) goals.push(nextHash);
          queue.push({ state: cur.state.map(b => [...b]), hash: nextHash });
        }
        let preds = predecessors.get(nextHash);
        if (!preds) { preds = new Set(); predecessors.set(nextHash, preds); }
        preds.add(cur.hash);
        for (let i = 0; i < k; i++) cur.state[m.from].push(cur.state[m.to].pop());
      }
    }
    if (timedOut) {
      return { ok:false, reachable:reachable.size, deadEnds:-1, exhausted:false, time:performance.now()-t0 };
    }
    if (goals.length === 0) {
      return { ok:false, reachable:reachable.size, deadEnds:reachable.size, exhausted:true, time:performance.now()-t0 };
    }
    const safe = new Set(goals);
    const safeQueue = [...goals];
    let safeHead = 0;
    while (safeHead < safeQueue.length) {
      const h = safeQueue[safeHead++];
      const preds = predecessors.get(h);
      if (!preds) continue;
      for (const p of preds) {
        if (!safe.has(p)) { safe.add(p); safeQueue.push(p); }
      }
    }
    const deadEnds = reachable.size - safe.size;
    return { ok: deadEnds === 0, reachable: reachable.size, deadEnds, exhausted: true, time: performance.now() - t0 };
  }

  return { findShortestPath, findReachableDeadEnds, isSolved, hashState };
})();

/* ============================================================
   [LEVELS] — палитра, 10 ручных уровней, генераторы V1/V2,
   endless mode.
   Portирован из RC_Colbs_v2/game/levels.js, адаптирован
   под палитру 8 цветов и ограничение "2-4 цвета максимум".
   ============================================================ */
window.Levels = (() => {
  const PALETTE = ['pink','orange','yellow','lime','teal','blue','purple','crimson'];

  // 10 default levels. `bottles` оставляем null — генерируются по seed
  // (детерминированно) через random-tuned. Для L1-L3 после первой генерации
  // можно закоммитить полученный bottles прямо сюда, чтобы старт был мгновенным.
  // Таймауты на уровнях держим короткими (≤ 3000мс). Если random-tuned не
  // успевает попасть в target — срабатывает fallback на reverse-shuffle,
  // который гарантирует решаемость по построению. Игра не блокируется
  // надолго на старте уровня. Для production-баланса конкретные раскладки
  // следует прописывать в `bottles: [...]` явно (см. docs/LEVELS.md).
  const DEFAULT_LEVELS = [
    { level: 1,  sticks: 3,  capacity: 3, emptyStick: 1, difficulty: 4,
      colours: ['pink','blue'],                          generator:'random-tuned', tuningTimeoutMs: 2000, seed: 1007, easyMode:true, distinctLayers:true },
    { level: 2,  sticks: 4,  capacity: 3, emptyStick: 1, difficulty: 6,
      colours: ['pink','blue','lime'],                   generator:'random-tuned', tuningTimeoutMs: 2500, seed: 2007, easyMode:true, distinctLayers:true },
    { level: 3,  sticks: 5,  capacity: 3, emptyStick: 1, difficulty: 9,
      colours: ['pink','blue','lime','purple'],          generator:'random-tuned', tuningTimeoutMs: 3000, seed: 3007, easyMode:true, distinctLayers:true },
    { level: 4,  sticks: 5,  capacity: 4, emptyStick: 1, difficulty: 12,
      colours: ['pink','orange','teal','purple'],        generator:'random-tuned', tuningTimeoutMs: 3000, seed: 4007, easyMode:true, distinctLayers:true },
    { level: 5,  sticks: 6,  capacity: 4, emptyStick: 2, difficulty: 14,
      colours: ['pink','yellow','blue','crimson'],       generator:'random-tuned', tuningTimeoutMs: 3000, seed: 5007, easyMode:true, distinctLayers:true },
    { level: 6,  sticks: 7,  capacity: 4, emptyStick: 3, difficulty: 16,
      colours: ['orange','lime','blue','purple'],        generator:'reverse-shuffle', seed: 6007 },
    { level: 7,  sticks: 7,  capacity: 4, emptyStick: 3, difficulty: 18,
      colours: ['pink','teal','yellow','crimson'],       generator:'reverse-shuffle', seed: 7007 },
    { level: 8,  sticks: 9,  capacity: 4, emptyStick: 1, difficulty: 20,
      colours: ['pink','orange','blue','lime'],          generator:'reverse-shuffle', seed: 8007 },
    { level: 9,  sticks: 10, capacity: 4, emptyStick: 2, difficulty: 22,
      colours: ['teal','yellow','purple','crimson'],     generator:'reverse-shuffle', seed: 9007 },
    { level: 10, sticks: 12, capacity: 4, emptyStick: 4, difficulty: 24,
      colours: ['pink','orange','blue','purple'],        generator:'reverse-shuffle', seed:10007 },
  ];

  const runtimeOverrides = {};
  function setRuntimeOverride(n, cfg) { if (cfg) runtimeOverrides[n] = cfg; else delete runtimeOverrides[n]; }
  function clearRuntimeOverride(n) { delete runtimeOverrides[n]; }
  function getRuntimeOverride(n) { return runtimeOverrides[n] || null; }
  function getLevelCount() { return DEFAULT_LEVELS.length; }

  /**
   * Endless mode. Все уровни L11+ — процедурные. Растим сложность по тирам,
   * но всегда держим 4 цвета максимум (требование задачи "2-4 максимум").
   *
   * Tier-таблица: каждые 4 endless-уровня шаг сложности увеличивается.
   * filled = sticks - emptyStick, делится на colors нацело (необходимо
   * для того, чтобы каждый цвет в финале занимал целое число полных колб).
   */
  const ENDLESS_TIERS = [
    // tier 0: 4 колбы на цвет → каждый цвет 1 полная колба
    { sticks: 7,  capacity: 4, emptyStick: 3, colors: 4, difficulty: 18 },
    { sticks: 8,  capacity: 4, emptyStick: 4, colors: 4, difficulty: 20 },
    { sticks: 9,  capacity: 4, emptyStick: 1, colors: 4, difficulty: 22 }, // 2 колбы на цвет
    { sticks: 10, capacity: 4, emptyStick: 2, colors: 4, difficulty: 24 }, // 2 колбы на цвет
    // tier 1: усложняем
    { sticks: 11, capacity: 4, emptyStick: 3, colors: 4, difficulty: 26 },
    { sticks: 12, capacity: 4, emptyStick: 4, colors: 4, difficulty: 28 },
    { sticks: 12, capacity: 3, emptyStick: 0, colors: 4, difficulty: 30 }, // 12*3/4=9 — целое
    { sticks: 9,  capacity: 4, emptyStick: 1, colors: 4, difficulty: 32 },
  ];

  const _endlessCache = {};
  function generateEndlessConfig(n) {
    const tierIdx = (n - DEFAULT_LEVELS.length - 1) % ENDLESS_TIERS.length;
    const tier = ENDLESS_TIERS[tierIdx];
    const palette = PALETTE.slice();
    shuffleInPlace(palette, Math.random);
    const colours = palette.slice(0, tier.colors);
    const seed = (Math.random() * 1e9) | 0;
    return {
      sticks: tier.sticks,
      capacity: tier.capacity,
      emptyStick: tier.emptyStick,
      difficulty: tier.difficulty,
      colours,
      // Используем reverse-shuffle: на больших полях random-tuned + easyMode
      // не успевает за разумное время. reverse-shuffle гарантирует решаемость
      // и работает в миллисекундах, даже на 12×4.
      generator: 'reverse-shuffle',
      distinctLayers: true,
      seed,
      endless: true,
    };
  }

  function getParams(n) {
    if (runtimeOverrides[n]) return { ...runtimeOverrides[n], level: n };
    const custom = window.Persist && window.Persist.loadCustomLevel
      ? window.Persist.loadCustomLevel(n) : null;
    if (custom) return { ...custom, level: n };
    if (n > DEFAULT_LEVELS.length) {
      if (!_endlessCache[n]) _endlessCache[n] = generateEndlessConfig(n);
      return { ..._endlessCache[n], level: n };
    }
    const idx = Math.max(0, Math.min(DEFAULT_LEVELS.length - 1, n - 1));
    return { ...DEFAULT_LEVELS[idx], level: n };
  }

  // -------- PRNG + helpers --------
  function mulberry32(seed) {
    let s = seed | 0;
    return function () {
      s = (s + 0x6D2B79F5) | 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function shuffleInPlace(arr, rng) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(rng() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }
  function clampDifficulty(d) {
    if (!Number.isFinite(d)) return 50;
    return Math.max(1, Math.min(1000, d | 0));
  }
  function clampTimeout(ms) {
    if (!Number.isFinite(ms)) return 5000;
    return Math.max(100, Math.min(600_000, ms | 0));
  }
  function hashState(state) { return state.map(s => s.join(',')).join('|'); }

  /**
   * Generator dispatcher:
   *   1. params.bottles given       → use verbatim
   *   2. params.generator='random-tuned' → V2 (random + BFS-tuned)
   *   3. otherwise                  → V1 (reverse-shuffle, default)
   */
  function generate(params) {
    let bottles;
    if (Array.isArray(params.bottles)) {
      bottles = params.bottles.map(s => [...s]);
    } else if (params.generator === 'random-tuned') {
      bottles = generateRandomTuned(params).bottles;
    } else {
      bottles = reverseShuffleFromSolved(params);
    }
    return permuteEmptyToEnd(bottles);
  }

  function permuteEmptyToEnd(sticks) {
    const filled = [], empty = [];
    for (const s of sticks) (s.length === 0 ? empty : filled).push(s);
    return [...filled, ...empty];
  }

  // -------- Generator V1: reverse-shuffle from solved --------
  function reverseShuffleFromSolved(params) {
    const { sticks, capacity, emptyStick, level } = params;
    const filled = sticks - emptyStick;
    const seed = (params.seed != null ? params.seed | 0 : (level | 0) * 1000 + 7);
    const rng = mulberry32(seed);
    const colours = (Array.isArray(params.colours) && params.colours.length >= 1)
      ? params.colours.slice(0, Math.min(filled, params.colours.length))
      : shuffleInPlace([...PALETTE], rng).slice(0, Math.min(filled, PALETTE.length));
    const state = [];
    for (let i = 0; i < filled; i++) {
      const arr = [];
      for (let j = 0; j < capacity; j++) arr.push(colours[i % colours.length]);
      state.push(arr);
    }
    for (let i = 0; i < emptyStick; i++) state.push([]);
    return reverseShuffle(state, capacity, clampDifficulty(params.difficulty), rng);
  }

  function reverseShuffle(state, capacity, difficulty, rng) {
    const N = state.length;
    const initialEmpty = state.filter(s => s.length === 0).length;
    const visited = new Set();
    visited.add(hashState(state));
    let lastMove = null;
    let accepted = 0, attempts = 0;
    const maxAttempts = difficulty * 8;
    while (accepted < difficulty && attempts < maxAttempts) {
      attempts++;
      const a = Math.floor(rng() * N);
      const b = Math.floor(rng() * N);
      if (a === b) continue;
      if (state[a].length === 0) continue;
      if (state[b].length >= capacity) continue;
      if (lastMove && lastMove.from === b && lastMove.to === a) continue;
      if (lastMove && lastMove.from === a && lastMove.to === b) continue;
      const donut = state[a].pop();
      state[b].push(donut);
      const h = hashState(state);
      if (visited.has(h)) { state[b].pop(); state[a].push(donut); continue; }
      visited.add(h);
      lastMove = { from: a, to: b };
      accepted++;
    }
    // compact pass: restore empty buffer count
    let safety = 200;
    let emptyNow = state.filter(s => s.length === 0).length;
    while (emptyNow < initialEmpty && safety-- > 0) {
      let src = -1, srcSize = Infinity;
      for (let i = 0; i < N; i++) {
        if (state[i].length > 0 && state[i].length < srcSize) { srcSize = state[i].length; src = i; }
      }
      if (src < 0) break;
      let progressed = false;
      for (let step = 0; step < srcSize; step++) {
        const candidates = [];
        for (let j = 0; j < N; j++) if (j !== src && state[j].length < capacity) candidates.push(j);
        if (candidates.length === 0) break;
        const dst = candidates[Math.floor(rng() * candidates.length)];
        const donut = state[src].pop();
        state[dst].push(donut);
        visited.add(hashState(state));
        progressed = true;
      }
      if (!progressed) break;
      emptyNow = state.filter(s => s.length === 0).length;
    }
    return state;
  }

  // -------- Generator V2: random + BFS-tuned --------
  let _lastTuningMeta = null;

  function generateRandomTuned(params) {
    const target = clampDifficulty(params.difficulty);
    const timeoutMs = clampTimeout(params.tuningTimeoutMs);
    const seed = (params.seed != null ? params.seed | 0 : (params.level | 0) * 1000 + 7);
    const rng = mulberry32(seed);
    const capacity = params.capacity;
    const multiTransfer = params.multiTransfer !== false;
    const easyMode = params.easyMode === true;
    const distinctLayers = params.distinctLayers === true;
    const easyAttempts = Math.max(1, Math.min(100000, (params.easyModeMaxAttempts | 0) || 100));
    const maxAttempts = easyMode ? easyAttempts : Infinity;
    const t0 = performance.now();

    let best = null;
    let attempts = 0, solvableAttempts = 0, deadEndFreeAttempts = 0;

    while (true) {
      const elapsed = performance.now() - t0;
      if (elapsed >= timeoutMs) break;
      if (attempts >= maxAttempts) break;
      const layout = randomLayout({ ...params, distinctLayers }, rng);
      attempts++;
      if (Solver.isSolved(layout, capacity)) continue;
      const remaining = timeoutMs - elapsed;
      const perAttempt = Math.min(remaining, 1000);
      const result = Solver.findShortestPath(layout, capacity, perAttempt, { multiTransfer });
      if (result.length === null) continue;
      solvableAttempts++;
      if (easyMode) {
        const remainingForCheck = Math.max(100, Math.floor((timeoutMs - (performance.now() - t0)) / 5));
        const verdict = Solver.findReachableDeadEnds(layout, capacity, {
          multiTransfer, timeLimitMs: Math.min(1000, remainingForCheck),
        });
        if (!verdict.ok) continue;
        deadEndFreeAttempts++;
      }
      const distance = Math.abs(result.length - target);
      if (!best || distance < best.distance) {
        best = { bottles: layout, optimalLength: result.length, distance };
        if (distance === 0) break;
      }
    }
    const elapsedMs = performance.now() - t0;

    if (!best) {
      _lastTuningMeta = {
        attempts, solvableAttempts, deadEndFreeAttempts, elapsedMs,
        optimalLength: null, distance: null,
        achievedExact: false, fallback: true,
        easyModeFailed: easyMode,
        target,
      };
      return { bottles: reverseShuffleFromSolved(params), ..._lastTuningMeta };
    }
    _lastTuningMeta = {
      attempts, solvableAttempts, deadEndFreeAttempts, elapsedMs,
      optimalLength: best.optimalLength,
      distance: best.distance,
      achievedExact: best.distance === 0,
      fallback: false,
      easyMode,
      target,
    };
    return { bottles: best.bottles, ..._lastTuningMeta };
  }

  function randomLayout(params, rng) {
    const { sticks, capacity, emptyStick } = params;
    const filled = sticks - emptyStick;
    let colours = (Array.isArray(params.colours) && params.colours.length >= 1)
      ? params.colours.slice()
      : PALETTE.slice(0, Math.min(filled, PALETTE.length));
    // Если цветов меньше чем filled — повторяем
    while (colours.length < filled) colours = colours.concat(colours).slice(0, filled);
    colours = colours.slice(0, filled);

    const distinct = params.distinctLayers === true && new Set(colours).size === filled;
    if (distinct) {
      const state = [];
      for (let i = 0; i < filled; i++) state.push([]);
      for (let layer = 0; layer < capacity; layer++) {
        const perm = shuffleInPlace([...colours], rng);
        for (let stick = 0; stick < filled; stick++) state[stick].push(perm[stick]);
      }
      for (let i = 0; i < emptyStick; i++) state.push([]);
      return state;
    }
    // distribute donuts: каждый цвет имеет (filled*capacity/colors_count) единиц
    const colorsUniq = [...new Set(colours)];
    const total = filled * capacity;
    const perColor = Math.floor(total / colorsUniq.length);
    const flat = [];
    for (const c of colorsUniq) for (let i = 0; i < perColor; i++) flat.push(c);
    while (flat.length < total) flat.push(colorsUniq[flat.length % colorsUniq.length]);
    shuffleInPlace(flat, rng);
    const state = [];
    for (let i = 0; i < filled; i++) state.push(flat.slice(i * capacity, (i + 1) * capacity));
    for (let i = 0; i < emptyStick; i++) state.push([]);
    return state;
  }

  function getLastTuningMeta() { return _lastTuningMeta; }

  return {
    PALETTE, DEFAULT_LEVELS, ENDLESS_TIERS,
    getParams, generate,
    generateRandomTuned, getLastTuningMeta,
    setRuntimeOverride, clearRuntimeOverride, getRuntimeOverride,
    getLevelCount,
  };
})();

/* ============================================================
   [STATE] — игровое состояние, ходы, undo, win-проверка.
   Адаптирован из RC_Colbs_v2/game/state.js. Убрана валюта
   (currency/tweezers) — в нашей игре ходы бесплатные. Добавлен
   bonusUsedThisLevel и addBonusBottle().
   ============================================================ */
window.State = (() => {
  let state = null;
  function deepCopy(arr) { return arr.map(s => [...s]); }

  function init({ level, capacity, sticks }) {
    state = {
      level,
      capacity,
      sticks,                   // string[][]
      initial: deepCopy(sticks),
      selected: null,
      moves: 0,                 // счётчик совершённых ходов
      history: [],              // стек для undo
      bonusUsedThisLevel: false,
    };
    return state;
  }
  function get() { return state; }
  function topColor(stack) { return stack.length ? stack[stack.length - 1] : null; }

  function isCompletedStack(stack, capacity) {
    return stack.length === capacity && stack.length > 0 && stack.every(c => c === stack[0]);
  }

  function canMove(src, dst) {
    if (!state || src === dst) return false;
    const a = state.sticks[src], b = state.sticks[dst];
    if (!a || !b) return false;
    if (a.length === 0) return false;
    if (isCompletedStack(a, state.capacity)) return false;
    if (b.length >= state.capacity) return false;
    if (b.length === 0) return true;
    return topColor(a) === topColor(b);
  }

  function move(src, dst) {
    if (!canMove(src, dst)) return 0;
    const a = state.sticks[src], b = state.sticks[dst];
    const top = a[a.length - 1];
    let runLen = 0;
    for (let i = a.length - 1; i >= 0 && a[i] === top; i--) runLen++;
    const room = state.capacity - b.length;
    const k = Math.min(runLen, room);
    for (let i = 0; i < k; i++) b.push(a.pop());
    state.moves++;
    state.history.push({ src, dst, count: k, color: top });
    return k;
  }

  function undo() {
    if (!state || state.history.length === 0) return false;
    const last = state.history.pop();
    const count = last.count || 1;
    for (let i = 0; i < count; i++) state.sticks[last.src].push(state.sticks[last.dst].pop());
    state.selected = null;
    if (state.moves > 0) state.moves--;
    return true;
  }

  function clickStick(idx) {
    if (!state) return 'invalid';
    if (state.selected === null) {
      if (state.sticks[idx].length === 0) return 'invalid';
      if (isCompletedStack(state.sticks[idx], state.capacity)) return 'locked';
      state.selected = idx;
      return 'selected';
    }
    if (state.selected === idx) {
      state.selected = null;
      return 'deselected';
    }
    const src = state.selected;
    const moved = move(src, idx);
    state.selected = null;
    return moved > 0 ? 'moved' : 'invalid';
  }

  function isWon() {
    if (!state) return false;
    let total = 0;
    for (const s of state.sticks) total += s.length;
    if (total === 0) return false;
    return state.sticks.every(s =>
      s.length === 0 || (s.length === state.capacity && s.every(c => c === s[0]))
    );
  }

  function restart() {
    if (!state) return;
    state.sticks = deepCopy(state.initial);
    state.selected = null;
    state.history = [];
    state.moves = 0;
    state.bonusUsedThisLevel = false;
  }

  /**
   * Добавить пустую колбочку (бонус за rewarded ad). Один раз на уровень.
   * Колба добавляется в конец массива; initial тоже обновляется, чтобы
   * Restart не убрал бонус.
   */
  function addBonusBottle() {
    if (!state || state.bonusUsedThisLevel) return false;
    state.sticks.push([]);
    state.initial.push([]);
    state.bonusUsedThisLevel = true;
    state.selected = null;
    return true;
  }

  return {
    init, get, canMove, move, undo, clickStick, isWon, restart,
    addBonusBottle, isCompletedStack, deepCopy,
  };
})();

/* ============================================================
   [PERSIST] — localStorage save/load.
   Ключ "glitterSort.v1". Хранит уровень, статистику, кастомные
   уровни из дев-панели, счётчик interstitial.
   ============================================================ */
window.Persist = (() => {
  const KEY = 'glitterSort.v1';
  const DEFAULTS = {
    version: 1,
    level: 1,
    totalCompleted: 0,
    interstitialCounter: 0,
    customLevels: {},        // {n: {sticks, capacity, ...}}
    settings: { sound: true },
    stats: { totalMoves: 0, undoUsed: 0, bonusUsed: 0 },
  };

  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (!raw) return { ...DEFAULTS };
      const parsed = JSON.parse(raw);
      // shallow merge с дефолтами на случай новых полей в будущих версиях
      return {
        ...DEFAULTS, ...parsed,
        settings: { ...DEFAULTS.settings, ...(parsed.settings || {}) },
        stats:    { ...DEFAULTS.stats,    ...(parsed.stats    || {}) },
        customLevels: parsed.customLevels || {},
      };
    } catch (e) {
      console.warn('[Persist] load failed, using defaults', e);
      return { ...DEFAULTS };
    }
  }

  function save(data) {
    try {
      localStorage.setItem(KEY, JSON.stringify(data));
    } catch (e) {
      console.warn('[Persist] save failed', e);
    }
  }

  // Custom level configs (overrides from dev panel, persist across reloads)
  function loadCustomLevel(n) {
    const data = load();
    return data.customLevels[n] || null;
  }
  function saveCustomLevel(n, cfg) {
    const data = load();
    data.customLevels[n] = cfg;
    save(data);
  }
  function clearCustomLevel(n) {
    const data = load();
    delete data.customLevels[n];
    save(data);
  }
  function clearAll() {
    try { localStorage.removeItem(KEY); } catch (e) {}
  }

  // Interstitial cadence: показывать каждые 2 пройденных уровня
  function bumpInterstitialCounter() {
    const data = load();
    data.interstitialCounter = (data.interstitialCounter || 0) + 1;
    save(data);
    return data.interstitialCounter;
  }
  function shouldShowInterstitial(counter) {
    return counter > 0 && counter % 2 === 0;
  }

  return {
    KEY, DEFAULTS, load, save,
    loadCustomLevel, saveCustomLevel, clearCustomLevel, clearAll,
    bumpInterstitialCounter, shouldShowInterstitial,
  };
})();

/* ============================================================
   [ADS] — рекламная абстракция с тремя backend'ами:
     1. Native — html2apk wrapper экспонирует window.YandexAds и
        вызывает window.__yandexAdsCallback по результатам.
     2. YaGames — window.YaGames для веб-публикации на Yandex Games.
     3. Mock — для dev-режима (открытие index.html файлом).
   Контракт нативного wrapper'а описан в docs/ADS.md.
   ============================================================ */
window.Ads = (() => {
  // Ad-unit IDs. Замени на свои в Yandex Partner перед сборкой релизного APK.
  const UNIT_INTERSTITIAL = 'R-M-DEMO-1';
  const UNIT_REWARDED     = 'R-M-DEMO-2';

  let backend = 'mock';
  let ysdk = null;
  // Хэндлеры для callback'ов от нативного бриджа
  let pendingInterstitial = null;
  let pendingRewarded = null;

  function init() {
    if (window.YandexAds && typeof window.YandexAds.showInterstitial === 'function') {
      backend = 'native';
      window.__yandexAdsCallback = (kind, event) => {
        if (kind === 'interstitial' && pendingInterstitial) {
          pendingInterstitial();
          pendingInterstitial = null;
        }
        if (kind === 'rewarded' && pendingRewarded) {
          pendingRewarded(event === 'rewarded');
          pendingRewarded = null;
        }
      };
      console.log('[Ads] backend=native (YandexAds bridge)');
      return Promise.resolve();
    }
    if (window.YaGames && typeof window.YaGames.init === 'function') {
      return window.YaGames.init().then(s => {
        ysdk = s;
        backend = 'yagames';
        console.log('[Ads] backend=yagames');
      }).catch(err => {
        console.warn('[Ads] YaGames init failed, falling back to mock', err);
        backend = 'mock';
      });
    }
    backend = 'mock';
    console.log('[Ads] backend=mock (dev)');
    return Promise.resolve();
  }

  function showInterstitial() {
    if (backend === 'native') {
      return new Promise(resolve => {
        pendingInterstitial = resolve;
        try { window.YandexAds.showInterstitial(UNIT_INTERSTITIAL); }
        catch (e) { console.warn('[Ads] native interstitial failed', e); pendingInterstitial = null; resolve(); }
      });
    }
    if (backend === 'yagames' && ysdk) {
      return new Promise(resolve => {
        ysdk.adv.showFullscreenAdv({
          callbacks: { onClose: () => resolve(), onError: () => resolve() },
        });
      });
    }
    // mock
    return new Promise(resolve => {
      console.log('[Ads] showInterstitial mock');
      setTimeout(resolve, 600);
    });
  }

  function showRewarded() {
    if (backend === 'native') {
      return new Promise(resolve => {
        pendingRewarded = (rewarded) => resolve({ rewarded });
        try { window.YandexAds.showRewarded(UNIT_REWARDED); }
        catch (e) { console.warn('[Ads] native rewarded failed', e); pendingRewarded = null; resolve({ rewarded: false }); }
      });
    }
    if (backend === 'yagames' && ysdk) {
      return new Promise(resolve => {
        let gotReward = false;
        ysdk.adv.showRewardedVideo({
          callbacks: {
            onRewarded: () => { gotReward = true; },
            onClose: () => resolve({ rewarded: gotReward }),
            onError: () => resolve({ rewarded: false }),
          },
        });
      });
    }
    // mock — всегда даём reward
    return new Promise(resolve => {
      console.log('[Ads] showRewarded mock — granting reward');
      setTimeout(() => resolve({ rewarded: true }), 800);
    });
  }

  function getBackend() { return backend; }

  return { init, showInterstitial, showRewarded, getBackend, UNIT_INTERSTITIAL, UNIT_REWARDED };
})();

/* ============================================================
   [RENDER] — отрисовка колбочек, HUD, модалок.
   ============================================================ */
window.Render = (() => {
  const $sticks = document.getElementById('sticks');
  const $hudLevel = document.getElementById('hud-level');
  const $hudMoves = document.getElementById('hud-moves');
  const $winModal = document.getElementById('win-modal');
  const $winText  = document.getElementById('win-text');
  const $toast    = document.getElementById('toast');
  const $bonus    = document.getElementById('btn-bonus');
  const $undo     = document.getElementById('btn-undo');

  function renderAll() {
    const s = State.get();
    if (!s) return;
    $sticks.dataset.count = String(s.sticks.length);
    $sticks.innerHTML = '';
    s.sticks.forEach((stack, idx) => $sticks.appendChild(buildBottle(stack, idx, s.capacity)));
    renderHud();
    renderActionButtons();
  }

  function buildBottle(stack, idx, capacity) {
    const el = document.createElement('div');
    el.className = 'bottle';
    el.dataset.idx = String(idx);
    el.style.setProperty('--cap', capacity);
    if (State.get().selected === idx) el.classList.add('selected');
    if (State.isCompletedStack(stack, capacity)) el.classList.add('completed');
    // bottom-up rendering (column-reverse в CSS); порядок в DOM — снизу вверх
    for (const color of stack) {
      const layer = document.createElement('div');
      layer.className = 'layer c-' + color;
      el.appendChild(layer);
    }
    return el;
  }

  function renderHud() {
    const s = State.get();
    if (!s) return;
    $hudLevel.textContent = s.level;
    $hudMoves.textContent = s.moves;
  }

  function renderActionButtons() {
    const s = State.get();
    if (!s) return;
    $undo.disabled = s.history.length === 0;
    // Бонусную колбу скрываем, если уже использовали в этом уровне
    // или колб уже > 12.
    $bonus.style.display = (s.bonusUsedThisLevel || s.sticks.length >= 13) ? 'none' : '';
  }

  function showWin(text) {
    if (text) $winText.textContent = text;
    $winModal.classList.add('open');
  }
  function hideWin() { $winModal.classList.remove('open'); }

  let toastTimer = null;
  function toast(msg, ms = 1500) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => $toast.classList.remove('show'), ms);
  }

  return { renderAll, renderHud, renderActionButtons, showWin, hideWin, toast };
})();

/* ============================================================
   [DEVPANEL] — редактор параметров текущего уровня.
   Toggle: Ctrl+Shift+D. Состоит из формы и статус-строки.
   Подробности: docs/LEVELS.md.
   ============================================================ */
window.DevPanel = (() => {
  const $panel = document.getElementById('dev-panel');
  const $body  = document.getElementById('dev-body');
  const $close = document.getElementById('dev-close');
  let isOpen = false;

  function open() {
    isOpen = true;
    render();
    $panel.classList.add('open');
  }
  function close() { isOpen = false; $panel.classList.remove('open'); }
  function toggle() { isOpen ? close() : open(); }

  $close.addEventListener('click', close);
  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.shiftKey && (e.key === 'D' || e.key === 'd' || e.code === 'KeyD')) {
      e.preventDefault();
      toggle();
    }
  });

  function render() {
    const s = State.get();
    if (!s) return;
    const cur = Levels.getParams(s.level);
    const colourSet = new Set(cur.colours || []);
    const sticks = cur.sticks | 0;
    const capacity = cur.capacity | 0;
    const emptyStick = cur.emptyStick | 0;
    const difficulty = cur.difficulty | 0;
    const tuningTimeoutMs = cur.tuningTimeoutMs | 0;
    const easyMode = !!cur.easyMode;
    const distinctLayers = !!cur.distinctLayers;
    const seed = cur.seed | 0;
    const generator = cur.generator || 'reverse-shuffle';

    $body.innerHTML = `
      <div class="dev-row"><label>Уровень</label><b style="color:var(--accent)">L${s.level}</b></div>
      <div class="dev-row"><label>Колбочки (sticks)</label><input type="number" id="dv-sticks" min="3" max="13" value="${sticks}"></div>
      <div class="dev-row"><label>Ёмкость (capacity)</label><input type="number" id="dv-cap" min="2" max="6" value="${capacity}"></div>
      <div class="dev-row"><label>Пустых (emptyStick)</label><input type="number" id="dv-empty" min="0" max="13" value="${emptyStick}"></div>
      <div class="dev-row"><label>Цвета (2-4)</label>
        <div class="swatches" id="dv-swatches">
          ${Levels.PALETTE.map(c => `
            <div class="sw ${colourSet.has(c) ? 'on' : ''}" data-c="${c}" style="--sw-color:var(--c-${c})" title="${c}"></div>
          `).join('')}
        </div>
      </div>
      <div class="dev-row"><label>Генератор</label>
        <select id="dv-gen">
          <option value="reverse-shuffle" ${generator==='reverse-shuffle'?'selected':''}>reverse-shuffle (V1)</option>
          <option value="random-tuned" ${generator==='random-tuned'?'selected':''}>random-tuned (V2)</option>
        </select>
      </div>
      <div class="dev-row"><label>Сложность (ходы)</label><input type="number" id="dv-diff" min="1" max="100" value="${difficulty}"></div>
      <div class="dev-row"><label>Тайм-аут (мс)</label><input type="number" id="dv-timeout" min="100" max="120000" step="500" value="${tuningTimeoutMs || 5000}"></div>
      <div class="dev-row"><label>Easy Mode</label><input type="checkbox" id="dv-easy" ${easyMode ? 'checked' : ''}> <span style="color:var(--text-dim)">без тупиков</span></div>
      <div class="dev-row"><label>Distinct layers</label><input type="checkbox" id="dv-distinct" ${distinctLayers ? 'checked' : ''}> <span style="color:var(--text-dim)">слои без повторов</span></div>
      <div class="dev-row"><label>Seed</label><input type="number" id="dv-seed" value="${seed}"></div>
      <div class="actions">
        <button class="primary" id="dv-generate">🎲 Сгенерировать</button>
        <button id="dv-save">💾 Сохранить override</button>
      </div>
      <div class="actions">
        <button id="dv-reset">↺ Сбросить override</button>
        <button id="dv-copy">📋 Copy JSON</button>
      </div>
      <div class="status" id="dv-status">Готов к генерации.</div>
    `;
    // Цветовые свотчи — toggle on click, лимит 2-4
    $body.querySelectorAll('.sw').forEach(sw => {
      sw.addEventListener('click', () => {
        sw.classList.toggle('on');
        const cur = $body.querySelectorAll('.sw.on').length;
        if (cur > 4) sw.classList.remove('on');
      });
    });
    document.getElementById('dv-generate').addEventListener('click', onGenerate);
    document.getElementById('dv-save').addEventListener('click', onSave);
    document.getElementById('dv-reset').addEventListener('click', onReset);
    document.getElementById('dv-copy').addEventListener('click', onCopy);
  }

  function readForm() {
    const colours = [...$body.querySelectorAll('.sw.on')].map(s => s.dataset.c);
    return {
      sticks: +document.getElementById('dv-sticks').value || 3,
      capacity: +document.getElementById('dv-cap').value || 3,
      emptyStick: +document.getElementById('dv-empty').value || 1,
      colours,
      generator: document.getElementById('dv-gen').value,
      difficulty: +document.getElementById('dv-diff').value || 1,
      tuningTimeoutMs: +document.getElementById('dv-timeout').value || 5000,
      easyMode: document.getElementById('dv-easy').checked,
      distinctLayers: document.getElementById('dv-distinct').checked,
      seed: +document.getElementById('dv-seed').value || Math.floor(Math.random() * 1e9),
    };
  }

  function setStatus(msg, kind) {
    const el = document.getElementById('dv-status');
    if (!el) return;
    el.textContent = msg;
    el.style.color = kind === 'err' ? 'var(--danger)' : kind === 'ok' ? 'var(--ok)' : 'var(--text-dim)';
  }

  function onGenerate() {
    const params = readForm();
    if (params.colours.length < 2) { setStatus('Выбери минимум 2 цвета', 'err'); return; }
    if (params.colours.length > 4) { setStatus('Максимум 4 цвета', 'err'); return; }
    const filled = params.sticks - params.emptyStick;
    if (filled <= 0) { setStatus('Слишком много пустых колб', 'err'); return; }
    if ((filled * params.capacity) % params.colours.length !== 0) {
      setStatus(`Внимание: filled*capacity (${filled * params.capacity}) не делится на ${params.colours.length} цветов нацело — баланс будет неровным.`);
    }
    setStatus('Генерация...');
    setTimeout(() => {
      try {
        const cfg = { ...params, level: State.get().level };
        Levels.setRuntimeOverride(cfg.level, cfg);
        const bottles = Levels.generate(cfg);
        State.init({ level: cfg.level, capacity: cfg.capacity, sticks: bottles.map(s => [...s]) });
        Render.renderAll();
        const meta = Levels.getLastTuningMeta();
        if (meta) {
          const exact = meta.achievedExact ? '✓' : '✗';
          setStatus(`attempts=${meta.attempts}, solvable=${meta.solvableAttempts}, optimal=${meta.optimalLength}, distance=${meta.distance} ${exact}, ${meta.elapsedMs|0}ms`, meta.achievedExact ? 'ok' : '');
        } else {
          setStatus('Сгенерировано (V1).', 'ok');
        }
      } catch (e) {
        console.error(e);
        setStatus('Ошибка: ' + e.message, 'err');
      }
    }, 30);
  }

  function onSave() {
    const params = readForm();
    if (params.colours.length < 2) { setStatus('Выбери минимум 2 цвета', 'err'); return; }
    const lvl = State.get().level;
    Persist.saveCustomLevel(lvl, { ...params, level: lvl });
    setStatus(`Override для L${lvl} сохранён в localStorage`, 'ok');
  }

  function onReset() {
    const lvl = State.get().level;
    Levels.clearRuntimeOverride(lvl);
    Persist.clearCustomLevel(lvl);
    setStatus(`Override L${lvl} сброшен. Перезагрузи уровень.`, 'ok');
  }

  function onCopy() {
    const params = readForm();
    const json = JSON.stringify({ ...params, level: State.get().level }, null, 2);
    try {
      navigator.clipboard.writeText(json);
      setStatus('JSON скопирован в буфер', 'ok');
    } catch (e) {
      console.log(json);
      setStatus('Не удалось — JSON в консоли', 'err');
    }
  }

  return { open, close, toggle, render };
})();

/* ============================================================
   [APP] — bootstrap, обработчики кликов, win flow.
   ============================================================ */
window.App = (() => {
  let session = null;       // { levelNum, params }
  let transferLocked = false;

  function start() {
    const persisted = Persist.load();
    Ads.init().finally(() => {
      loadLevel(persisted.level || 1);
      wireEvents();
    });
  }

  function loadLevel(levelNum) {
    const params = Levels.getParams(levelNum);
    Render.toast(`Уровень ${levelNum}: генерация...`, 600);
    // Генератор может быть тяжёлым на старших уровнях — даём UI отрендерить
    // toast перед блокирующим вызовом.
    setTimeout(() => {
      const bottles = Levels.generate(params);
      State.init({
        level: levelNum,
        capacity: params.capacity,
        sticks: bottles.map(s => [...s]),
      });
      session = { levelNum, params };
      Render.renderAll();
      Render.hideWin();
    }, 30);
  }

  function wireEvents() {
    document.getElementById('sticks').addEventListener('click', (e) => {
      const bottle = e.target.closest('.bottle');
      if (!bottle) return;
      const idx = +bottle.dataset.idx;
      if (Number.isNaN(idx)) return;
      onStickClick(idx);
    });

    document.getElementById('btn-undo').addEventListener('click', onUndo);
    document.getElementById('btn-restart').addEventListener('click', onRestart);
    document.getElementById('btn-next').addEventListener('click', onNext);
    document.getElementById('btn-bonus').addEventListener('click', onBonus);
  }

  function onStickClick(idx) {
    if (transferLocked) return;
    const result = State.clickStick(idx);
    if (result === 'invalid') return;
    Render.renderAll();
    if (result === 'moved' && State.isWon()) onWin();
  }

  function onUndo() {
    const s = State.get();
    if (!s || s.history.length === 0) { Render.toast('Нечего отменять'); return; }
    State.undo();
    const persisted = Persist.load();
    persisted.stats.undoUsed = (persisted.stats.undoUsed || 0) + 1;
    Persist.save(persisted);
    Render.renderAll();
  }

  function onRestart() {
    State.restart();
    Render.renderAll();
    Render.toast('Уровень перезапущен');
  }

  function onWin() {
    const s = State.get();
    transferLocked = true;
    const persisted = Persist.load();
    persisted.totalCompleted = (persisted.totalCompleted || 0) + 1;
    persisted.stats.totalMoves = (persisted.stats.totalMoves || 0) + (s ? s.moves : 0);
    // Следующий уровень сохраним заранее, чтобы перезагрузка после победы
    // показывала уже новый.
    persisted.level = (s ? s.level : 1) + 1;
    Persist.save(persisted);
    Render.showWin(`Молодец! Готов к уровню ${persisted.level}?`);
  }

  function onNext() {
    transferLocked = false;
    const counter = Persist.bumpInterstitialCounter();
    const persisted = Persist.load();
    const nextLevel = persisted.level;
    if (Persist.shouldShowInterstitial(counter)) {
      Render.toast('Реклама...', 1200);
      Ads.showInterstitial().finally(() => loadLevel(nextLevel));
    } else {
      loadLevel(nextLevel);
    }
  }

  function onBonus() {
    const s = State.get();
    if (!s || s.bonusUsedThisLevel) { Render.toast('Бонус уже использован'); return; }
    if (s.sticks.length >= 13) { Render.toast('Больше колб не помещается'); return; }
    Render.toast('Реклама...', 1500);
    Ads.showRewarded().then(res => {
      if (!res || !res.rewarded) { Render.toast('Реклама не была досмотрена'); return; }
      if (State.addBonusBottle()) {
        const persisted = Persist.load();
        persisted.stats.bonusUsed = (persisted.stats.bonusUsed || 0) + 1;
        Persist.save(persisted);
        Render.renderAll();
        Render.toast('+1 колба (бонус)');
      }
    });
  }

  return { start, loadLevel };
})();

document.addEventListener('DOMContentLoaded', () => App.start());
console.log('[GlitterSort] All modules loaded');
</script>
